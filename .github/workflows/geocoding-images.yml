name: Geocoding Images

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/geocoding-images.yml
      - charts/geocoding-helm-chart/images/**
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to build and push
        required: true
        default: 0.0.1
      push_latest:
        description: Also tag images as latest
        type: boolean
        required: true
        default: false

permissions:
  contents: read

concurrency:
  group: geocoding-images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: forwardmeasure
  IMAGE_TAG: ${{ github.event.inputs.image_tag || '0.0.1' }}

jobs:
  build-and-push:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 240

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: nominatim
            context: charts/geocoding-helm-chart/images/nominatim
          - name: libpostal-service
            context: charts/geocoding-helm-chart/images/libpostal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        shell: bash
        run: |
          image="${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.image.name }}"
          {
            echo "tags<<EOF"
            echo "${image}:${IMAGE_TAG}"
            if [ "${{ github.event.inputs.push_latest || 'false' }}" = "true" ]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=geocoding-${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=geocoding-${{ matrix.image.name }}
