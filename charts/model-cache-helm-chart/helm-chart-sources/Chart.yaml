apiVersion: v2
name: model-cache
description: |
  Provisions shared model cache infrastructure for model-serving workloads.

  This chart supports multiple usage modes:

  1. StorageClass-only mode
     Creates only the shared cluster-scoped StorageClass.

  2. Producer mode
     Creates a workload-specific PersistentVolume and optional
     PersistentVolumeClaim and ServiceAccount.

  3. Consumer mode
     Creates a namespace-scoped PersistentVolumeClaim and optional
     ServiceAccount that bind to a pre-existing PersistentVolume.

  Cloud backends are configured via storageClass.provisioner and
  persistentVolume.csi.* — override these in your cloud-specific values file.
  On GCP this can use the GCS FUSE CSI driver. On AWS use S3 Mountpoint or EFS.
  On bare metal use NFS or local storage.

  This chart never derives PersistentVolume names from release namespace or
  release name. PersistentVolume names must always be set explicitly.

type: application
version: "0.1.8"
appVersion: "1.0.0"
keywords:
  - model-cache
  - storage
  - pvc
  - pv
  - storageclass
  - object-storage
  - model-serving
  - machine-learning
