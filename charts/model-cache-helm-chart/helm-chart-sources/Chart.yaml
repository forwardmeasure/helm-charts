apiVersion: v2
name: model-cache
description: |
  Provisions the shared model cache infrastructure for model-serving workloads.
  Creates a StorageClass, PersistentVolume, PersistentVolumeClaim, and
  ServiceAccount in the release namespace. Designed to be deployed as a
  dependency before any workload that needs access to the shared model cache
  (docling-serve, Triton, etc.).

  Cloud backends are configured via storageClass.provisioner and
  persistentVolume.csi — override these in your cloud-specific values file.
  On GCP this uses the GCS FUSE CSI driver. On AWS use S3 Mountpoint or EFS.
  On bare metal use NFS or local storage.

  Deploy once per workload namespace that needs model cache access.
type: application
version: "0.1.4"
appVersion: "1.0.0"
keywords:
  - model-cache
  - storage
  - pvc
  - object-storage
  - model-serving
  - machine-learning
