# ==============================================================================
# model-cache chart values
# ==============================================================================

# ------------------------------------------------------------------------------
# Storage size — single source of truth for both PV and PVC.
# ------------------------------------------------------------------------------
size: 200Gi

# ------------------------------------------------------------------------------
# StorageClass
# Cluster-scoped. Set create: false if the StorageClass already exists in the
# cluster (e.g. created by Terraform or another chart).
# ------------------------------------------------------------------------------
storageClass:
  create: true
  name: model-cache-sc
  # Provisioner is cloud-specific — override in your cloud values file.
  # GCP:     gcsfuse.csi.storage.gke.io
  # AWS EFS: efs.csi.aws.com
  # AWS S3:  s3.csi.aws.com
  # NFS:     nfs.csi.k8s.io
  provisioner: ""
  reclaimPolicy: Retain
  volumeBindingMode: Immediate
  allowVolumeExpansion: false
  parameters: {}

# ------------------------------------------------------------------------------
# PersistentVolume
# Cluster-scoped.
#
# Set create: true to create a workload-specific PV.
# The PV name must always be set explicitly.
#
# For CSI-backed PVs, the actual binding to the backing storage is provided by
# csi.volumeHandle. The chart exposes this but does not infer it.
# ------------------------------------------------------------------------------
persistentVolume:
  create: false
  name: ""
  accessMode: ReadWriteMany
  mountOptions: []
  csi:
    driver: ""
    volumeHandle: ""
    volumeAttributes: {}

# ------------------------------------------------------------------------------
# PersistentVolumeClaim
# Namespace-scoped.
#
# If persistentVolume.create=true, the PVC binds to persistentVolume.name.
# If persistentVolume.create=false, existingVolumeName must be set explicitly.
# ------------------------------------------------------------------------------
persistentVolumeClaim:
  create: false
  name: model-cache-pvc
  accessMode: ReadWriteMany
  existingVolumeName: ""

# ------------------------------------------------------------------------------
# ServiceAccount
# Namespace-scoped.
#
# Set create: true when this chart should create the KSA used by workloads.
# imagePullSecrets are attached to the ServiceAccount so workload pods that
# reuse this ServiceAccount can pull private runtime images reliably.
# ------------------------------------------------------------------------------
serviceAccount:
  create: false
  name: model-cache-sa
  annotations: {}

# ------------------------------------------------------------------------------
# Optional image pull secrets attached to the ServiceAccount when created.
# Example:
# imagePullSecrets:
#   - name: docker-io-credentials
# ------------------------------------------------------------------------------
imagePullSecrets: []
