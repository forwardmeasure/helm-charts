{{- include "model-cache.validatePersistentVolume" . }}
{{- if .Values.persistentVolume.create }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "model-cache.pvName" . }}
  labels:
    {{- include "model-cache.labels" . | nindent 4 }}
spec:
  capacity:
    storage: {{ .Values.size }}
  volumeMode: Filesystem
  accessModes:
    - {{ .Values.persistentVolume.accessMode }}
  persistentVolumeReclaimPolicy: {{ .Values.storageClass.reclaimPolicy }}
  storageClassName: {{ .Values.storageClass.name }}
  {{- with .Values.persistentVolume.mountOptions }}
  mountOptions:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if .Values.persistentVolumeClaim.create }}
  claimRef:
    namespace: {{ .Release.Namespace }}
    name: {{ .Values.persistentVolumeClaim.name }}
  {{- end }}
  csi:
    driver: {{ .Values.persistentVolume.csi.driver }}
    volumeHandle: {{ .Values.persistentVolume.csi.volumeHandle }}
    {{- with .Values.persistentVolume.csi.volumeAttributes }}
    volumeAttributes:
      {{- toYaml . | nindent 6 }}
    {{- end }}
{{- end }}