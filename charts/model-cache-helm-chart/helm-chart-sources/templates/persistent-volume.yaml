# ==============================================================================
# model-cache chart values
# ==============================================================================

# ------------------------------------------------------------------------------
# Storage size — single source of truth for both PV and PVC.
# ------------------------------------------------------------------------------
size: 200Gi

# ------------------------------------------------------------------------------
# StorageClass
# Cluster-scoped. Set create: false if the StorageClass already exists in the
# cluster (e.g. created by Terraform or another chart).
# ------------------------------------------------------------------------------
storageClass:
  create: true
  name: model-cache-sc
  # Provisioner is cloud-specific — override in your cloud values file.
  # GCP:     gcsfuse.csi.storage.gke.io
  # AWS EFS: efs.csi.aws.com
  # AWS S3:  s3.csi.aws.com
  # NFS:     nfs.csi.k8s.io
  provisioner: ""
  reclaimPolicy: Retain
  volumeBindingMode: Immediate
  allowVolumeExpansion: false
  # Cloud-specific parameters — override in your cloud values file.
  parameters: {}

# ------------------------------------------------------------------------------
# PersistentVolume
# Cluster-scoped. Set create: false if the PV already exists.
# The PV name is suffixed with the release namespace to avoid collisions when
# the chart is deployed into multiple namespaces.
# ------------------------------------------------------------------------------
persistentVolume:
  create: true
  accessMode: ReadWriteMany
  # Cloud-specific CSI block — override in your cloud values file.
  # GCP example:
  #   csi:
  #     driver: gcsfuse.csi.storage.gke.io
  #     volumeHandle: my-model-cache-bucket
  #     volumeAttributes:
  #       gcsfuseLoggingSeverity: warning
  csi: {}

# ------------------------------------------------------------------------------
# PersistentVolumeClaim
# Namespace-scoped. Always created — this is the resource workloads reference.
# The claim name is fixed as model-cache-pvc for consistency across workloads.
# ------------------------------------------------------------------------------
persistentVolumeClaim:
  name: model-cache-pvc
  accessMode: ReadWriteMany

# ------------------------------------------------------------------------------
# ServiceAccount
# Namespace-scoped. Used by all model-serving workloads in this namespace
# to access the model cache storage backend via Workload Identity or IRSA.
# ------------------------------------------------------------------------------
serviceAccount:
  create: true
  name: model-cache-sa
  # Cloud-specific annotations — override in your cloud values file.
  # GCP Workload Identity example:
  #   annotations:
  #     iam.gke.io/gcp-service-account: my-sa@my-project.iam.gserviceaccount.com
  # AWS IRSA example:
  #   annotations:
  #     eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/my-role
  annotations: {}
