{{- include "model-cache.validatePersistentVolumeClaim" . }}
{{- if .Values.persistentVolumeClaim.create }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.persistentVolumeClaim.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "model-cache.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistentVolumeClaim.accessMode }}
  storageClassName: {{ .Values.storageClass.name }}
  volumeName: {{ include "model-cache.pvcVolumeName" . }}
  resources:
    requests:
      storage: {{ .Values.size }}
{{- end }}