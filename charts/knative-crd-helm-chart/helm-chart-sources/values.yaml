# ---------------------------------------------------------------------------
# values.yaml — knative-crd chart defaults
# ---------------------------------------------------------------------------
knativeVersion: "1.21.0"

serving:
  namespace: knative-serving
  istioNamespace: istio-system
  # Name of the Knative local gateway service in istioNamespace
  localGatewayName: knative-local-gateway
  # Name of the platform-owned local gateway service created by this chart.
  # Selects the actual platform gateway pods and is referenced by config-istio.
  # Must be different from localGatewayName which is owned by net-istio.
  platformLocalGatewayName: knative-local-gateway-platform
  # Name of the platform Istio Gateway resource
  # Used to set the selector on the knative-local-gateway service
  gatewayName: ""
  config:
    # DNS domain for Knative services — override per environment
    domain: ""
    progressDeadline: "1800s"
    # -------------------------------------------------------------------------
    # Autoscaler configuration
    #
    # camelCase keys here map to hyphenated keys in the config-autoscaler
    # ConfigMap via the KnativeServing spec.config.config-autoscaler block.
    #
    # allowZeroInitialScale: must be true for scale-to-zero to work on freshly
    #   created revisions. Without this, Knative keeps at least one pod running
    #   even when minScale: 0 is set on the revision annotation.
    # minScale: cluster-wide default minimum replicas. Overridden per-service
    #   via autoscaling.knative.dev/minScale annotation on the Knative Service.
    # -------------------------------------------------------------------------
    autoscaler:
      allowZeroInitialScale: "true"
      minScale: "0"
      scaleToZeroGracePeriod: "30s"
      scaleToZeroPodRetentionPeriod: "0s"

eventing:
  namespace: knative-eventing
  kafka:
    bootstrapServers: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
    authSecretName: ""
    authSecretNamespace: ""
