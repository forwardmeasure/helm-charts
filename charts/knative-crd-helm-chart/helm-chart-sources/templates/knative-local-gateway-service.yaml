# prettier-ignore
---
# ---------------------------------------------------------------------------
# Patches the knative-local-gateway Service to use the correct selector
# pointing at the platform Istio gateway pods.
#
# The net-istio installation creates this service with selector
# istio=ingressgateway which matches no pods in a Gateway API setup.
# This resource overrides the selector to match the actual gateway pods.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.serving.localGatewayName }}
  namespace: {{ .Values.serving.istioNamespace }}
  labels:
    app.kubernetes.io/component: net-istio
    app.kubernetes.io/name: knative-serving
    app.kubernetes.io/version: {{ .Values.knativeVersion }}
    experimental.istio.io/disable-gateway-port-translation: "true"
    networking.knative.dev/ingress-provider: istio
spec:
  type: ClusterIP
  selector:
    gateway.networking.k8s.io/gateway-name: {{ .Values.serving.gatewayName }}
  ports:
    - name: http2
      port: 80
      targetPort: 8081
    - name: https
      port: 443
      targetPort: 8444
