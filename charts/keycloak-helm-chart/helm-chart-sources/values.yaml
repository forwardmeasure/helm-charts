# ---------------------------------------------------------------------------
# values.yaml — Keycloak Helm chart defaults
# ---------------------------------------------------------------------------

nameOverride: ""
fullnameOverride: ""

replicaCount: 1
podManagementPolicy: Parallel
updateStrategy: RollingUpdate
terminationGracePeriodSeconds: 60
enableServiceLinks: true

image:
  repository: quay.io/keycloak/keycloak
  tag: "26.5"
  pullPolicy: Always

imagePullSecrets: []

service:
  type: ClusterIP

# ---------------------------------------------------------------------------
# Keycloak configuration
# ---------------------------------------------------------------------------
keycloak:
  httpPort: 8080
  httpsPort: 8443
  hostname: ""
  hostnameUrl: ""
  hostnameDebug: "true"
  hostnameStrict: "false"
  proxy: edge
  httpEnabled: "true"
  httpRelativePath: /auth
  transactionXaEnabled: "false"
  logLevel: INFO
  log: console
  healthEnabled: "true"
  metricsEnabled: "true"

  # Database
  db:
    type: postgres
    # schema: optional — omit to use database default
    schema: ""
    # driver: optional — omit to use Keycloak's built-in driver for the db type
    driver: ""
    poolInitialSize: "5"
    poolMinSize: "5"
    poolMaxSize: "20"
    # Secret must contain: KC_DB_USERNAME, KC_DB_PASSWORD, KC_DB_URL
    # Set urlPropertiesSecret: true if the secret also contains KC_DB_URL_PROPERTIES
    credentialsSecret: keycloak-db-credentials
    urlPropertiesSecret: false

  # Secret must contain: KEYCLOAK_ADMIN, KEYCLOAK_ADMIN_PASSWORD
  adminCredentialsSecret: keycloak-admin-credentials

# ---------------------------------------------------------------------------
# TLS
# Secret must contain tls.crt and tls.key
# ---------------------------------------------------------------------------
tls:
  secretName: data-fabric-tls-secret

# ---------------------------------------------------------------------------
# Realm bootstrap
# Mounts a realm JSON file from a ConfigMap into /opt/keycloak/data/import
# ---------------------------------------------------------------------------
realm:
  # Set enabled: true to mount and auto-import a realm on first boot.
  # Override in your environment-specific values file (e.g. gcp-workfusion.yaml.gotmpl).
  # The ConfigMap and credentialsSecret must be created in the kustomize overlay
  # for the target environment before deploying.
  enabled: false
  name: datafabric
  configMapName: bootstrap-keycloak-realm-configmap
  configMapKey: bootstrap-keycloak-realm.json
  # Secret must contain: KEYCLOAK_DEFAULT_REALM_NAME, KEYCLOAK_DEFAULT_CLIENT_ID,
  #   KEYCLOAK_DEFAULT_CLIENT_SECRET, KEYCLOAK_DEFAULT_USERNAME, KEYCLOAK_DEFAULT_USER_PASSWORD
  credentialsSecret: keycloak-default-realm-credentials
  features: "scripts,authorization"
  javaOpts: >-
    -Dkeycloak.migration.action=import
    -Dkeycloak.migration.provider=dir
    -Dkeycloak.migration.dir=/opt/keycloak/data/import
    -Dkeycloak.migration.strategy=OVERWRITE_EXISTING
    -Dkeycloak.migration.replace-placeholders=true
  json: ""

# ---------------------------------------------------------------------------
# ServiceAccount
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ---------------------------------------------------------------------------
# Security contexts
# ---------------------------------------------------------------------------
podSecurityContext:
  fsGroup: 1000

containerSecurityContext:
  runAsUser: 1000

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi

# ---------------------------------------------------------------------------
# Probes
# ---------------------------------------------------------------------------
readinessProbe:
  enabled: true
  path: /health/ready
  initialDelaySeconds: 120
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 18

livenessProbe:
  enabled: true
  path: /health/live
  initialDelaySeconds: 300
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 6

startupProbe:
  enabled: true
  path: /health/ready
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 120 # 10 minutes

# ---------------------------------------------------------------------------
# Affinity — defaults to pod anti-affinity for HA
# ---------------------------------------------------------------------------
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/component
              operator: NotIn
              values:
                - test
        topologyKey: kubernetes.io/hostname
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: NotIn
                values:
                  - test
          topologyKey: failure-domain.beta.kubernetes.io/zone

# ---------------------------------------------------------------------------
# Extra configuration
# ---------------------------------------------------------------------------
extraEnv: []
extraVolumes: []
extraVolumeMounts: []

# Cloud-specific things like workload identity
gcp:
  workloadIdentity:
    enabled: false
    gcpServiceAccountName: ""
    gcpProjectId: ""

cloudSqlProxy:
  enabled: false
  image:
    repository: gcr.io/cloud-sql-connectors/cloud-sql-proxy
    tag: "2.11.0"
    pullPolicy: IfNotPresent
  instanceConnectionName: ""
  port: 5432
  credentialsSecret: gcp-service-account-credentials
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

podAnnotations: {}
