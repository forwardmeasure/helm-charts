# ---------------------------------------------------------------------------
# values.yaml — Keycloak Helm chart defaults
# ---------------------------------------------------------------------------

nameOverride: ""
fullnameOverride: ""

replicaCount: 1
podManagementPolicy: Parallel
updateStrategy: RollingUpdate
terminationGracePeriodSeconds: 60
enableServiceLinks: true

image:
  repository: quay.io/keycloak/keycloak
  tag: "26.5"
  pullPolicy: Always

imagePullSecrets: []

service:
  type: ClusterIP

# ---------------------------------------------------------------------------
# Keycloak runtime configuration
# ---------------------------------------------------------------------------
keycloak:
  httpPort: 8080
  httpsPort: 8443
  managementPort: 9000

  hostname: ""
  hostnameDebug: "false"
  hostnameStrict: "false"

  # Prefer proxyHeaders for modern deployments behind ingress/gateway.
  # Set to "xforwarded" or "forwarded" as appropriate.
  proxyHeaders: ""
  proxy: ""

  httpEnabled: "true"
  httpRelativePath: /auth
  transactionXaEnabled: "false"
  logLevel: INFO
  log: console

  db:
    type: postgres
    schema: public
    driver: ""
    poolInitialSize: "5"
    poolMinSize: "5"
    poolMaxSize: "20"

    # Secret must contain:
    # - KC_DB_USERNAME
    # - KC_DB_PASSWORD
    # - KC_DB_URL
    # Optionally:
    # - KC_DB_URL_PROPERTIES
    credentialsSecret: keycloak-db-credentials
    urlPropertiesSecret: false

  # Secret must contain:
  # - KEYCLOAK_ADMIN
  # - KEYCLOAK_ADMIN_PASSWORD
  adminCredentialsSecret: keycloak-admin-credentials

# ---------------------------------------------------------------------------
# TLS
# Secret must contain:
# - tls.crt
# - tls.key
# ---------------------------------------------------------------------------
tls:
  secretName: data-fabric-tls-secret

# ---------------------------------------------------------------------------
# Realm bootstrap
# The realm file is always defined. Import behavior is controlled by realm.import:
# - none
# - bootstrap
# - overwrite
# ---------------------------------------------------------------------------
realm:
  import: overwrite

  realm: datafabric
  displayName: DataFabric
  configMapKey: datafabric-realm.json
  file: files/datafabric-realm.json

  features: "scripts,authorization"

  # Secret must contain:
  # - DATAFABRIC_DEFAULT_CONFIDENTIAL_CLIENT_SECRET
  # - DATAFABRIC_ADMIN_CONFIDENTIAL_CLIENT_SECRET
  clientSecretsSecret: keycloak-realm-client-secrets

  accessTokenLifespan: "3600"
  ssoSessionIdleTimeout: "1800"
  ssoSessionMaxLifespan: "36000"
  offlineSessionIdleTimeout: "2592000"
  accessCodeLifespan: "60"

  publicClient:
    clientId: datafabric-public
    name: "DataFabric Public SPA Client"
    redirectUri1: "https://datafabric.asvinau.com/*"
    redirectUri2: "http://localhost:3000/*"
    webOrigin1: "https://datafabric.asvinau.com"
    webOrigin2: "http://localhost:3000"
    postLogoutRedirectUris: "https://datafabric.asvinau.com/*##http://localhost:3000/*"

  defaultConfidentialClient:
    clientId: datafabric-confidential
    name: "DataFabric Confidential API Client"

  adminPublicClient:
    clientId: datafabric-admin-public
    name: "DataFabric Admin Public Client"
    redirectUri1: "https://datafabric.asvinau.com/*"
    redirectUri2: "http://localhost:3000/*"
    webOrigin1: "https://datafabric.asvinau.com"
    webOrigin2: "http://localhost:3000"
    postLogoutRedirectUris: "https://datafabric.asvinau.com/*##http://localhost:3000/*"

  adminConfidentialClient:
    clientId: datafabric-admin-confidential
    name: "DataFabric Admin Confidential Client"

# ---------------------------------------------------------------------------
# Bootstrap admin user
# Created by the post-install / post-upgrade hook.
# ---------------------------------------------------------------------------
bootstrapAdminUser:
  username: "admin@forwardmeasure.com"
  email: "admin@forwardmeasure.com"
  firstName: "Admin"
  lastName: "User"
  passwordSecret: keycloak-bootstrap-admin-user-credentials

  # -----------------------------------------------------------------------
  # Data Fabric platform roles (realm roles)
  # -----------------------------------------------------------------------
  datafabricRoles:
    viewer: datafabric-platform-viewer
    accessAdmin: datafabric-access-admin
    platformAdmin: datafabric-platform-admin

  # -----------------------------------------------------------------------
  # Keycloak realm-management roles for bootstrap user
  # (used for Keycloak administration, not platform auth)
  # -----------------------------------------------------------------------
  keycloakRealmManagementRoles: "manage-clients,manage-users,manage-realm,view-clients,view-users,query-clients,query-users"

  # -----------------------------------------------------------------------
  # Keycloak readiness tuning (for slow startups / cold clusters)
  # -----------------------------------------------------------------------
  keycloakReadySleepSeconds: 5
  keycloakReadyMaxAttempts: 60

# ---------------------------------------------------------------------------
# ServiceAccount
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ---------------------------------------------------------------------------
# Security contexts
# ---------------------------------------------------------------------------
podSecurityContext:
  fsGroup: 1000

containerSecurityContext:
  runAsUser: 1000

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi

# ---------------------------------------------------------------------------
# Probes
# Target Keycloak management interface over HTTP.
# ---------------------------------------------------------------------------
readinessProbe:
  enabled: true
  path: /auth/health/ready
  port: 9000
  scheme: HTTP
  initialDelaySeconds: 120
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 18
  httpHeaders: []

livenessProbe:
  enabled: true
  path: /auth/health/live
  port: 9000
  scheme: HTTP
  initialDelaySeconds: 300
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 6
  httpHeaders: []

startupProbe:
  enabled: true
  path: /auth/health/ready
  port: 9000
  scheme: HTTP
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 120
  httpHeaders: []

# ---------------------------------------------------------------------------
# Affinity — defaults to pod anti-affinity for HA
# ---------------------------------------------------------------------------
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/component
              operator: NotIn
              values:
                - test
        topologyKey: kubernetes.io/hostname
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: NotIn
                values:
                  - test
          topologyKey: failure-domain.beta.kubernetes.io/zone

# ---------------------------------------------------------------------------
# Extra configuration
# ---------------------------------------------------------------------------
extraEnv: []
extraVolumes: []
extraVolumeMounts: []

# ---------------------------------------------------------------------------
# GCP / Workload Identity
# ---------------------------------------------------------------------------
gcp:
  workloadIdentity:
    enabled: false
    gcpServiceAccountName: ""
    gcpProjectId: ""

cloudSqlProxy:
  enabled: false
  image:
    repository: gcr.io/cloud-sql-connectors/cloud-sql-proxy
    tag: "2.21.1"
    pullPolicy: IfNotPresent
  instanceConnectionName: ""
  port: 5432
  credentialsSecret: gcp-service-account-credentials
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

# ---------------------------------------------------------------------------
# Pod annotations (merged into pod template metadata.annotations)
# ---------------------------------------------------------------------------
podAnnotations: {}
