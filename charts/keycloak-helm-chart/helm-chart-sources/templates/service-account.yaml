{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name | default (printf "%s-service-account" (include "keycloak.fullname" .)) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  {{- if or .Values.serviceAccount.annotations .Values.gcp.workloadIdentity.enabled }}
  annotations:
    {{- if .Values.gcp.workloadIdentity.enabled }}
    iam.gke.io/gcp-service-account: {{ .Values.gcp.workloadIdentity.gcpServiceAccountName }}@{{ .Values.gcp.workloadIdentity.gcpProjectId }}.iam.gserviceaccount.com
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
imagePullSecrets:
  {{- if .Values.imagePullSecrets }}
  {{- toYaml .Values.imagePullSecrets | nindent 2 }}
  {{- end }}
{{- end }}