apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "keycloak.fullname" . }}-post-install
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "keycloak.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: post-install-scripts
          configMap:
            name: {{ include "keycloak.fullname" . }}-post-install-scripts
            defaultMode: 0755
      containers:
        - name: bootstrap-admin-user
          image: docker.io/forwardmeasure/ml-model-utilities:latest
          imagePullPolicy: Always
          volumeMounts:
            - name: post-install-scripts
              mountPath: /opt/bootstrap/bootstrap-admin.sh
              subPath: bootstrap-admin.sh
              readOnly: true
          env:
            - name: KEYCLOAK_URL
              value: "http://{{ include "keycloak.fullname" . }}-internal:{{ .Values.keycloak.httpPort }}{{ .Values.keycloak.httpRelativePath }}"
            - name: REALM
              value: {{ .Values.realm.realm | quote }}

            - name: ADMIN_USERNAME
              value: {{ .Values.bootstrapAdminUser.username | quote }}
            - name: ADMIN_EMAIL
              value: {{ .Values.bootstrapAdminUser.email | quote }}
            - name: ADMIN_FIRST_NAME
              value: {{ .Values.bootstrapAdminUser.firstName | quote }}
            - name: ADMIN_LAST_NAME
              value: {{ .Values.bootstrapAdminUser.lastName | quote }}

            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapAdminUser.passwordSecret }}
                  key: password

            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.adminCredentialsSecret }}
                  key: KEYCLOAK_ADMIN

            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.adminCredentialsSecret }}
                  key: KEYCLOAK_ADMIN_PASSWORD

            - name: DATAFABRIC_ROLE_VIEWER
              value: {{ default "datafabric-platform-viewer" .Values.bootstrapAdminUser.datafabricRoles.viewer | quote }}

            - name: DATAFABRIC_ROLE_ACCESS_ADMIN
              value: {{ default "datafabric-access-admin" .Values.bootstrapAdminUser.datafabricRoles.accessAdmin | quote }}

            - name: DATAFABRIC_ROLE_PLATFORM_ADMIN
              value: {{ default "datafabric-platform-admin" .Values.bootstrapAdminUser.datafabricRoles.platformAdmin | quote }}

            - name: DATAFABRIC_ADMIN_PUBLIC_CLIENT_ID
              value: {{ .Values.realm.adminPublicClient.clientId | quote }}

            - name: DATAFABRIC_ADMIN_CONFIDENTIAL_CLIENT_ID
              value: {{ .Values.realm.adminConfidentialClient.clientId | quote }}

            - name: KEYCLOAK_REALM_MGMT_ROLES
              value: {{ default "manage-clients,manage-users,manage-realm,view-clients,view-users,query-clients,query-users" .Values.bootstrapAdminUser.keycloakRealmManagementRoles | quote }}

            - name: DATAFABRIC_TENANT_GROUP_ROLES
              value: {{ default "" .Values.bootstrapAdminUser.tenantGroupRoles | quote }}

            - name: KEYCLOAK_READY_SLEEP_SECONDS
              value: {{ default 5 .Values.bootstrapAdminUser.keycloakReadySleepSeconds | quote }}

            - name: KEYCLOAK_READY_MAX_ATTEMPTS
              value: {{ default 60 .Values.bootstrapAdminUser.keycloakReadyMaxAttempts | quote }}

          command:
            - /bin/sh
            - /opt/bootstrap/bootstrap-admin.sh