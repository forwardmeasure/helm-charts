{{- if and .Values.database.createSecret (or .Values.postgres.enabled .Values.nominatim.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "geocoding.databaseSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "geocoding.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
  {{- with .Values.database.secretAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  PGHOST: {{ include "geocoding.databaseHost" . | quote }}
  PGPORT: {{ include "geocoding.databasePort" . | quote }}
  PGMAINTENANCEDATABASE: {{ .Values.database.maintenanceDatabase | quote }}
  PGDATABASE: {{ .Values.database.name | quote }}
  PGUSER: {{ .Values.database.username | quote }}
  PGPASSWORD: {{ .Values.database.password | quote }}
  {{- if .Values.database.sslMode }}
  PGSSLMODE: {{ .Values.database.sslMode | quote }}
  {{- end }}
  {{- if .Values.database.dsn }}
  NOMINATIM_DATABASE_DSN: {{ .Values.database.dsn | quote }}
  {{- end }}
  {{- range $key, $value := .Values.database.extraSecretStringData }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
