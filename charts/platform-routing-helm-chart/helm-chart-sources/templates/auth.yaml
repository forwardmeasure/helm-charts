{{- /*
  Renders Istio RequestAuthentication and AuthorizationPolicy resources.
  Supports both singular auth (backwards compatible) and auths[] list
  (for routes that need JWT enforcement on multiple workloads, e.g. a
  single HTTPRoute that proxies to two different backend services).
*/ -}}
{{- range .Values.routes }}
{{- $route := . }}

{{- /* ----------------------------------------------------------------
     Singular auth block — backwards compatible
     ---------------------------------------------------------------- */}}
{{- if .auth }}
{{- if .auth.enabled }}
{{- $authNamespace := .auth.workloadNamespace | default $.Values.gateway.namespace }}
---
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: {{ .name }}
  namespace: {{ $authNamespace }}
spec:
  selector:
    matchLabels:
      {{- toYaml .auth.selector | nindent 6 }}
  jwtRules:
    - issuer: {{ .auth.issuerUrl | quote }}
      jwksUri: {{ .auth.jwksUri | quote }}
      forwardOriginalToken: true
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ .name }}
  namespace: {{ $authNamespace }}
spec:
  selector:
    matchLabels:
      {{- toYaml .auth.selector | nindent 6 }}
  action: ALLOW
  rules:
    - from:
        - source:
            requestPrincipals: ["*"]
    - to:
        - operation:
            ports:
              {{- range (.auth.internalPorts | default $.Values.authDefaults.internalPorts) }}
              - {{ . | quote }}
              {{- end }}
    - from:
        - source:
            namespaces: ["knative-serving"]
{{- end }}
{{- end }}

{{- /* ----------------------------------------------------------------
     auths[] list — one RequestAuthentication + AuthorizationPolicy
     per entry. Use when a single route proxies to multiple workloads
     that each need independent JWT enforcement.
     ---------------------------------------------------------------- */}}
{{- if .auths }}
{{- range .auths }}
{{- if .enabled }}
{{- $authNamespace := .workloadNamespace | default $.Values.gateway.namespace }}
---
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: {{ $route.name }}-{{ .name }}
  namespace: {{ $authNamespace }}
spec:
  selector:
    matchLabels:
      {{- toYaml .selector | nindent 6 }}
  jwtRules:
    - issuer: {{ .issuerUrl | quote }}
      jwksUri: {{ .jwksUri | quote }}
      forwardOriginalToken: true
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ $route.name }}-{{ .name }}
  namespace: {{ $authNamespace }}
spec:
  selector:
    matchLabels:
      {{- toYaml .selector | nindent 6 }}
  action: ALLOW
  rules:
    - from:
        - source:
            requestPrincipals: ["*"]
    - to:
        - operation:
            ports:
              {{- range (.internalPorts | default $.Values.authDefaults.internalPorts) }}
              - {{ . | quote }}
              {{- end }}
    - from:
        - source:
            namespaces: ["knative-serving"]
{{- end }}
{{- end }}
{{- end }}

{{- end }}