{{- /*
  Generate one ReferenceGrant per unique backend service per route.
  One grant per service works around an Istio bug where multiple services
  in the same namespace within a single ReferenceGrant to[] list causes
  the second and subsequent services to resolve as UnknownService in the
  Envoy config dump.
*/ -}}
{{- range .Values.routes }}
{{- $route := . }}
{{- $routeKind := .kind | default "HTTP" }}
{{- $fromKind := "HTTPRoute" }}
{{- if eq $routeKind "TCP" }}
{{- $fromKind = "TCPRoute" }}
{{- end }}
{{- /* Collect unique namespace+service pairs for this route */ -}}
{{- $seen := dict }}
{{- range .rules }}
{{- $ns := .backend.namespace }}
{{- $svc := .backend.name }}
{{- $key := printf "%s|%s" $ns $svc }}
{{- if not (hasKey $seen $key) }}
{{- $_ := set $seen $key (dict "ns" $ns "svc" $svc) }}
{{- end }}
{{- end }}
{{- range $key, $entry := $seen }}
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: {{ $route.name }}-{{ $entry.svc }}
  namespace: {{ $entry.ns }}
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: {{ $fromKind }}
      namespace: {{ $.Values.gateway.namespace }}
  to:
    - kind: Service
      name: {{ $entry.svc }}
      group: ""
{{- end }}
{{- end }}