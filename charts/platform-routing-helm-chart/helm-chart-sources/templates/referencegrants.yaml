{{- /*
  Generate one ReferenceGrant per unique backend namespace per route.
  The grant allows HTTPRoutes/TCPRoutes in the gateway namespace to
  reference Services in the backend namespace.
*/ -}}
{{- range .Values.routes }}
{{- $route := . }}
{{- $routeKind := .kind | default "HTTP" }}
{{- $fromKind := "HTTPRoute" }}
{{- if eq $routeKind "TCP" }}
{{- $fromKind = "TCPRoute" }}
{{- end }}
{{- /* Collect unique backend namespaces for this route */ -}}
{{- $namespaces := dict }}
{{- range .rules }}
{{- $_ := set $namespaces .backend.namespace .backend.name }}
{{- end }}
{{- range $ns, $svcName := $namespaces }}
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: {{ $route.name }}
  namespace: {{ $ns }}
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: {{ $fromKind }}
      namespace: {{ $.Values.gateway.namespace }}
  to:
    - kind: Service
      name: {{ $svcName }}
      group: ""
{{- end }}
{{- end }}
