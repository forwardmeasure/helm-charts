{{- if .Values.gateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
spec:
  gatewayClassName: {{ .Values.gateway.gatewayClassName }}
  addresses:
    - type: IPAddress
      value: {{ .Values.gateway.loadBalancerIp }}
  listeners:
    # HTTP listener — used only for redirect to HTTPS
    - name: http
      hostname: {{ .Values.gateway.rootHostname }}
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    # Root HTTPS listener
    - name: root-https
      hostname: {{ .Values.gateway.rootHostname }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .Values.gateway.rootTlsSecret }}
      allowedRoutes:
        namespaces:
          from: All
    {{- range .Values.gateway.listeners }}
    - name: {{ .name }}
      hostname: {{ .hostname }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .tlsSecret }}
      allowedRoutes:
        namespaces:
          from: All
    {{- end }}
    # Valkey TCP listener
    - name: valkey-tcp
      port: 6379
      protocol: TCP
      allowedRoutes:
        namespaces:
          from: All

{{- if .Values.httpRedirect.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-redirect
  namespace: {{ .Values.gateway.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      sectionName: http
  hostnames:
    - "*.{{ .Values.gateway.rootHostname }}"
    - {{ .Values.gateway.rootHostname }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            port: 443
{{- end }}

{{- if .Values.telemetry.enabled }}
---
apiVersion: telemetry.istio.io/v1
kind: Telemetry
metadata:
  name: mesh-default
  namespace: {{ .Values.gateway.namespace }}
spec:
  accessLogging:
    - providers:
        - name: envoy
{{- end }}
{{- end }}
