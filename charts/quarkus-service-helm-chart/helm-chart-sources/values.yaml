# ==============================================================================
# quarkus-service chart — default values
# ==============================================================================

nameOverride: ""
fullnameOverride: ""

# Pod annotations applied to all Knative Service pods in this release.
podAnnotations:
  traffic.sidecar.istio.io/excludeInboundPorts: "8080"

# ------------------------------------------------------------------------------
# Image pull secrets
# ------------------------------------------------------------------------------
imagePullSecrets:
  - name: docker-io-credentials

# ------------------------------------------------------------------------------
# ServiceAccount
# create: true  — chart creates its own SA
# create: false — use a pre-existing SA; name must still be set
# annotations:  empty by default; GCP Workload Identity applied via overlay:
#   iam.gke.io/gcp-service-account: <gsa>@<project>.iam.gserviceaccount.com
# ------------------------------------------------------------------------------
serviceAccount:
  create: true
  name: quarkus-serving-sa
  labels: {}
  annotations: {}

# ------------------------------------------------------------------------------
# External Secrets Operator — chart-level defaults
# Applied to all ExternalSecrets unless overridden.
# ------------------------------------------------------------------------------
externalSecret:
  clusterSecretStore: fake-secret-store
  refreshInterval: 1h

# ------------------------------------------------------------------------------
# Release-level shared secrets
# Produces one ExternalSecret per entry, named <release>-<secretName>.
# Use for secrets shared across multiple services in this release
# (e.g. shared DB credentials, shared OIDC config).
#
# Format:
#   secrets:
#     - secretName: db
#       entries:
#         - secretKey: db-username
#           remoteKey: /my-release/db/username
#         - secretKey: db-password
#           remoteKey: /my-release/db/password
#     - secretName: oidc
#       entries:
#         - secretKey: oidc-auth-server-url
#           remoteKey: /my-api/oidc/auth-server-url
#
# Services reference these via secretName in their secrets list — the chart
# resolves the Kubernetes secret name as <release>-<secretName>.
# ------------------------------------------------------------------------------
secrets: []

# ------------------------------------------------------------------------------
# Cloud SQL Auth Proxy sidecar — chart-level defaults
# Applied to all services with cloudSqlProxy.enabled: true.
# Proxy listens on localhost:<port>, handles IAM auth via Workload Identity.
# App connects to localhost:<port> with standard PostgreSQL JDBC.
# privateIp: true — required when Cloud SQL instance has no public IP.
# ------------------------------------------------------------------------------
cloudSqlProxy:
  image:
    registry: gcr.io
    repository: cloud-sql-connectors/cloud-sql-proxy
    tag: "2.14.1"
    digest: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  port: 5432
  privateIp: true

# ------------------------------------------------------------------------------
# Liquibase migration wait — chart-level defaults
# Rendered as an init container on every enabled service unless the service
# sets liquibaseWait.enabled: false (e.g. the liquibase service itself).
# Polls GET /migration/schemas/public/ready — 200 = ready, 503 = migrating.
# ------------------------------------------------------------------------------
liquibaseWait:
  enabled: true
  image: curlimages/curl:latest
  imagePullPolicy: IfNotPresent
  serviceName: liquibase-migration
  serviceNamespace: data-fabric
  maxAttempts: 30
  sleepSeconds: 10
  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ------------------------------------------------------------------------------
# Kafka topic provisioning via Strimzi KafkaTopic CRD.
#
# namespace:    Kubernetes namespace where KafkaTopic resources are created.
#               Must match the namespace of the Strimzi operator and Kafka
#               cluster — typically "kafka".
#
# clusterName:  Value of the strimzi.io/cluster label. Must match the
#               metadata.name of the Kafka custom resource in the cluster.
#               Run: kubectl get kafka -A to find the correct name.
#
# topicPrefix:  Prepended to every topic suffix to form the full topic name.
#               Format: <topicPrefix>.<topic.suffix>
#               Should match the naming convention used across the platform
#               and must match what is provisioned in Strimzi per environment.
#               Example: com.forwardmeasure.entity-resolution
#
# defaults:     Chart-level defaults applied to all topics unless overridden
#               per-topic. Any field can be overridden at the topic level.
#
# topics:       List of KafkaTopic resources to provision. Each entry produces
#               one KafkaTopic in the Kafka namespace.
#
# Topic entry fields:
#   suffix:           Required. Appended to topicPrefix to form the topic name.
#                     Example: ingest-evidence
#                     Results in: com.forwardmeasure.entity-resolution.ingest-evidence
#   description:      Optional. Human-readable comment rendered in the manifest.
#   partitions:       Number of partitions. Default: kafka.defaults.partitions.
#   replicas:         Replication factor. Default: kafka.defaults.replicas.
#   retentionMs:      Message retention in milliseconds. Default: 7 days (604800000).
#   cleanupPolicy:    delete or compact. Default: delete.
#   compressionType:  none, gzip, snappy, lz4, zstd, producer. Default: lz4.
#   minInsyncReplicas: Minimum in-sync replicas for writes. Default: 2.
#   maxMessageBytes:  Maximum message size in bytes. Omitted if not set.
#   segmentMs:        Time after which an active log segment is rolled.
#                     Omitted if not set.
# ------------------------------------------------------------------------------
kafka:
  namespace: kafka
  clusterName: kafka-cluster
  topicPrefix: com.forwardmeasure.entity-resolution

  defaults:
    partitions: 12
    replicas: 3
    retentionMs: "604800000" # 7 days
    cleanupPolicy: delete
    compressionType: lz4
    minInsyncReplicas: 2

  # Topics provisioned by this release.
  # Add one entry per topic the service owns.
  topics: []
  # Example:
  #   - suffix: ingest-evidence
  #     description: >
  #       Durable ingestion commands. Produced by EvidenceIngestionPipelineSupport,
  #       consumed by DurableEvidenceIngestionRoute.
  #     partitions: 12
  #     replicas: 3
  #     retentionMs: "604800000"
  #     minInsyncReplicas: 2
  #
  #   - suffix: extraction.dlq
  #     description: >
  #       Dead-letter queue for failed extraction pipeline messages.
  #     partitions: 3
  #     replicas: 3
  #     retentionMs: "2592000000"   # 30 days

  # ------------------------------------------------------------------------------
  # Services
  # Each entry produces a Knative Service + Cloud SQL proxy sidecar (if enabled).
  # Per-service secrets (unique to that service) are declared here under secrets[].
  # Shared secrets across services are declared at the top-level secrets[] above.
  # ------------------------------------------------------------------------------
services: []
