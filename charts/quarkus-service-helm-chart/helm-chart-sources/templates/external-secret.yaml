{{- $root := $ -}}

{{- /*
  ============================================================================
  PASS 1: Release-level shared secrets
  Declared at Values.secrets[]. One ExternalSecret per secretName entry,
  named <release>-<secretName>. Shared by all services that reference the
  same secretName in their own secrets list.
  ============================================================================
*/ -}}
{{- range .Values.secrets }}
---
# ---------------------------------------------------------------------------
# Shared ExternalSecret: {{ include "quarkus-service.k8sSecretName" (dict "root" $root "secretName" .secretName) }}
# Release-level secret shared across all services in this release.
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "quarkus-service.k8sSecretName" (dict "root" $root "secretName" .secretName) }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    {{- include "quarkus-service.labels" $root | nindent 4 }}
spec:
  refreshInterval: {{ $root.Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ $root.Values.externalSecret.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ include "quarkus-service.k8sSecretName" (dict "root" $root "secretName" .secretName) }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    {{- range .entries }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteKey }}
        {{- if .property }}
        property: {{ .property }}
        {{- end }}
    {{- end }}
{{- end }}

{{- /*
  ============================================================================
  PASS 2: Per-service secrets
  Declared under services[].secrets[]. Produces one ExternalSecret per unique
  secretName within each service, named <release>-<service>-<secretName>.
  Only rendered for secrets whose secretName is NOT already declared in the
  release-level secrets[] above — prevents duplicate ExternalSecrets.
  ============================================================================
*/ -}}
{{- $sharedSecretNames := dict -}}
{{- range .Values.secrets -}}
{{- $_ := set $sharedSecretNames .secretName true -}}
{{- end -}}

{{- range .Values.services -}}
{{- if and .enabled .secrets -}}
{{- $service := . -}}
{{- /* Group per-service secrets by secretName, skipping shared ones */ -}}
{{- $groups := dict -}}
{{- range .secrets -}}
{{- if not (hasKey $sharedSecretNames .secretName) -}}
{{- $existing := index $groups .secretName | default list -}}
{{- $_ := set $groups .secretName (append $existing .) -}}
{{- end -}}
{{- end -}}
{{- range $secretName, $entries := $groups }}
---
# ---------------------------------------------------------------------------
# Per-service ExternalSecret: {{ include "quarkus-service.k8sSecretName" (dict "root" $root "secretName" (printf "%s-%s" $service.name $secretName)) }}
# Secret unique to service {{ $service.name }} in this release.
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "quarkus-service.k8sSecretName" (dict "root" $root "secretName" (printf "%s-%s" $service.name $secretName)) }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    {{- include "quarkus-service.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $service.name }}
spec:
  refreshInterval: {{ $root.Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ $root.Values.externalSecret.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ include "quarkus-service.k8sSecretName" (dict "root" $root "secretName" (printf "%s-%s" $service.name $secretName)) }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    {{- range $entries }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteKey }}
        {{- if .property }}
        property: {{ .property }}
        {{- end }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}