{{- range .Values.services }}
{{- if and .enabled .secrets }}
---
# ---------------------------------------------------------------------------
# ExternalSecret for {{ .name }}
# Fetches secrets from the configured ClusterSecretStore and materialises
# them into a Kubernetes Secret that the Knative Service pod references
# for environment variable injection.
#
# Target secret name follows the convention: <release>-<namespace>-<secretName>
# This matches the secretKeyRef names in knative-service.yaml exactly.
#
# Note: property is only set when explicitly specified in the secret entry.
# Omitting property causes ESO to read the entire secret value directly —
# required for flat string secrets (e.g. fake provider, GCP Secret Manager
# secrets that store a plain string rather than a JSON object).
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "quarkus-service.k8sSecretName" (dict "root" $ "secretName" .name) }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "quarkus-service.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .name }}
spec:
  refreshInterval: {{ include "quarkus-service.secretRefreshInterval" (dict "service" . "root" $) }}
  secretStoreRef:
    name: {{ include "quarkus-service.secretStoreName" (dict "service" . "root" $) }}
    kind: ClusterSecretStore
  target:
    name: {{ include "quarkus-service.k8sSecretName" (dict "root" $ "secretName" .name) }}
    creationPolicy: Owner
  data:
    {{- range .secrets }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteKey }}
        {{- if .property }}
        property: {{ .property }}
        {{- end }}
    {{- end }}
{{- end }}
{{- end }}