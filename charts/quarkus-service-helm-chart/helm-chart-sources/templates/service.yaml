{{- range .Values.services }}
{{- if and .enabled (eq (.deploymentMode | default "knative") "deployment") }}
---
# ---------------------------------------------------------------------------
# Service: {{ .name }}
# ClusterIP Service exposing the HTTP port for Istio, other services,
# and health check endpoints. Knative creates this automatically — for
# standard Deployments it must be declared explicitly.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "quarkus-service.serviceLabels" (dict "service" . "root" $) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: {{ .name }}
    quarkus-service/family: {{ $.Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .port | default 8080 }}
      protocol: TCP
{{- end }}
{{- end }}