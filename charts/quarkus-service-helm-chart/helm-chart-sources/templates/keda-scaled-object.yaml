{{- range .Values.services }}
{{- if and .enabled (eq (.deploymentMode | default "knative") "deployment") }}
{{- $scaling := .scaling | default (dict) }}
{{- if eq ($scaling.autoscaler | default "none") "keda" }}
{{- if not $scaling.triggers }}
{{- fail (printf "service '%s' has scaling.autoscaler=keda but scaling.triggers is empty" .name) }}
{{- end }}
{{- $minReplicaCount := 1 }}
{{- if hasKey $scaling "minReplicas" }}
{{- $minReplicaCount = $scaling.minReplicas }}
{{- end }}
{{- $maxReplicaCount := 4 }}
{{- if hasKey $scaling "maxReplicas" }}
{{- $maxReplicaCount = $scaling.maxReplicas }}
{{- end }}
---
# ---------------------------------------------------------------------------
# ScaledObject: {{ .name }}
# KEDA-managed autoscaling for {{ .name }}.
# When this resource is present, KEDA owns the HPA for this deployment —
# the chart does not render a separate HPA (see hpa.yaml).
#
# pollingInterval:  How often KEDA checks the scaler metrics (seconds).
# cooldownPeriod:   How long to wait after last trigger before scaling to
#                   minReplicaCount (seconds).
# minReplicaCount:  Minimum replicas. Set to 0 to allow scale-to-zero when
#                   the configured scaler supports activation from zero.
# maxReplicaCount:  Maximum replicas KEDA will scale to.
# ---------------------------------------------------------------------------
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "quarkus-service.serviceLabels" (dict "service" . "root" $) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .name }}
  pollingInterval: {{ $scaling.pollingInterval | default 15 }}
  cooldownPeriod: {{ $scaling.cooldownPeriod | default 300 }}
  minReplicaCount: {{ $minReplicaCount }}
  maxReplicaCount: {{ $maxReplicaCount }}
  triggers:
    {{- range $scaling.triggers }}
    - type: {{ .type }}
      metadata:
        {{- range $k, $v := .metadata }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
