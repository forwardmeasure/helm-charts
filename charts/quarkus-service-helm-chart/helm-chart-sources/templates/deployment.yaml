{{- range .Values.services }}
{{- if and .enabled (eq (.deploymentMode | default "knative") "deployment") }}
{{- include "quarkus-service.validateService" (dict "service" . "root" $) }}
{{- $scaling := .scaling | default (dict) }}
{{- $minReplicas := 1 }}
{{- if hasKey $scaling "initialReplicas" }}
{{- $minReplicas = $scaling.initialReplicas }}
{{- else if hasKey $scaling "minReplicas" }}
{{- $minReplicas = $scaling.minReplicas }}
{{- end }}
---
# ---------------------------------------------------------------------------
# Deployment: {{ .name }}
# Standard Kubernetes Deployment.
# Autoscaling is selected explicitly with scaling.autoscaler:
# none | hpa | keda.
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "quarkus-service.serviceLabels" (dict "service" . "root" $) | nindent 4 }}
spec:
  replicas: {{ $minReplicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: {{ .name }}
      quarkus-service/family: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        {{- include "quarkus-service.serviceLabels" (dict "service" . "root" $) | nindent 8 }}
      {{- $podAnnotations := include "quarkus-service.podAnnotations" (dict "service" . "root" $) }}
      {{- if $podAnnotations }}
      annotations:
        {{- $podAnnotations | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ $.Values.serviceAccount.name }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "quarkus-service.initContainers" (dict "service" . "root" $) | nindent 6 }}
      containers:
        {{- include "quarkus-service.mainContainer" (dict "service" . "root" $) | nindent 8 }}
        {{- include "quarkus-service.cloudSqlProxySidecar" (dict "service" . "root" $) | nindent 8 }}
{{- end }}
{{- end }}
