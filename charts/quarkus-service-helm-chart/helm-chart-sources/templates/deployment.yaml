{{- range .Values.services }}
{{- if and .enabled (eq (.deploymentMode | default "knative") "deployment") }}
{{- include "quarkus-service.validateService" (dict "service" . "root" $) }}
---
# ---------------------------------------------------------------------------
# Deployment: {{ .name }}
# Standard Kubernetes Deployment — no Knative, no scale-to-zero.
# Use for services that require stable long-lived connections (Spark driver,
# Kafka consumers with large state, etc.).
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "quarkus-service.serviceLabels" (dict "service" . "root" $) | nindent 4 }}
spec:
  replicas: {{ .scaling.minReplicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/component: {{ .name }}
      quarkus-service/family: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        {{- include "quarkus-service.serviceLabels" (dict "service" . "root" $) | nindent 8 }}
      annotations:
        {{- with $.Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ $.Values.serviceAccount.name }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "quarkus-service.initContainers" (dict "service" . "root" $) | nindent 6 }}
      containers:
        {{- include "quarkus-service.mainContainer" (dict "service" . "root" $) | nindent 8 }}
        {{- include "quarkus-service.cloudSqlProxySidecar" (dict "service" . "root" $) | nindent 8 }}
{{- end }}
{{- end }}