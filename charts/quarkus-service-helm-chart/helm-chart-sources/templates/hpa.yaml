{{- range .Values.services }}
{{- if and .enabled (eq (.deploymentMode | default "knative") "deployment") }}
{{- $scaling := .scaling | default (dict) }}
{{- if eq ($scaling.autoscaler | default "none") "hpa" }}
{{- $minReplicas := 1 }}
{{- if hasKey $scaling "minReplicas" }}
{{- $minReplicas = $scaling.minReplicas }}
{{- end }}
{{- if not (hasKey $scaling "maxReplicas") }}
{{- fail (printf "service '%s' has scaling.autoscaler=hpa but scaling.maxReplicas is not set" .name) }}
{{- end }}
{{- $maxReplicas := $scaling.maxReplicas }}
{{- if not (gt ($maxReplicas | int) ($minReplicas | int)) }}
{{- fail (printf "service '%s' has scaling.autoscaler=hpa but scaling.maxReplicas must be greater than scaling.minReplicas" .name) }}
{{- end }}
---
# ---------------------------------------------------------------------------
# HorizontalPodAutoscaler: {{ .name }}
# Rendered only when scaling.autoscaler: hpa.
# ---------------------------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "quarkus-service.serviceLabels" (dict "service" . "root" $) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .name }}
  minReplicas: {{ $minReplicas }}
  maxReplicas: {{ $maxReplicas }}
  metrics:
    {{- if $scaling.cpuTarget }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $scaling.cpuTarget }}
    {{- end }}
    {{- if $scaling.memoryTarget }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $scaling.memoryTarget }}
    {{- end }}
    {{- if not (or $scaling.cpuTarget $scaling.memoryTarget) }}
    # Default: scale on CPU utilization at 70%
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ $scaling.scaleDownStabilizationSeconds | default 300 }}
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: {{ $scaling.scaleUpStabilizationSeconds | default 30 }}
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
{{- end }}
{{- end }}
{{- end }}
