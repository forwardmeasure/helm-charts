apiVersion: v1
kind: Service
metadata:
  name: {{ include "docling-serve.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: {{ .Values.service.name }}
  selector:
    app: {{ include "docling-serve.name" . }}
