{{- /*
  PersistentVolumeClaim template for docling-serve model cache.

  Two modes:
  1. persistence.existingClaim is set → skip creation entirely.
     The chart uses the pre-existing shared model-cache-pvc. This is the
     standard mode when deploying against the shared GCS FUSE model cache.

  2. persistence.create = true AND persistence.existingClaim is empty →
     create a standalone PVC owned by this release. Used for local/dev
     deployments without the shared model cache infrastructure.
*/ -}}
{{- if and .Values.persistence.create (not .Values.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "docling-serve.fullname" . }}-cache
  labels:
    {{- include "docling-serve.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
{{- end }}