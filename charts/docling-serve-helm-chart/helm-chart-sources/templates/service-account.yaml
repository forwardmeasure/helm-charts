{{- /*
  ServiceAccount template for docling-serve.

  Creates the model-cache-sa ServiceAccount used by both the init container
  (model download) and the main container (model serving) to access the
  shared GCS FUSE model cache PVC via Workload Identity.

  The cloud-specific Workload Identity annotation
  (iam.gke.io/gcp-service-account) is NOT set here — it is injected by the
  cloud-specific Kustomize overlay (overlays/gcp/docling-serve-sa-patch.yaml)
  after Helm renders the chart. This keeps the chart cloud-agnostic.

  Set serviceAccount.create = false to skip creation if the SA is managed
  externally (e.g. by the model-cache base manifests).
*/ -}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name | default "model-cache-sa" }}
  labels:
    {{- include "docling-serve.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}