{{- /*
  ServiceAccount for docling-serve.

  create: true  — this chart creates the SA using name and annotations.
  create: false — use a pre-existing SA (e.g. model-cache-sa from the
                  model-cache chart). The Deployment still references
                  serviceAccount.name so it must be set correctly.
*/ -}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docling-serve.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}