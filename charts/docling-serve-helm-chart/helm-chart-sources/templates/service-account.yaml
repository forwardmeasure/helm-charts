{{- /*
  ServiceAccount for docling-serve.

  When externalModelCache is true, the SA is created by the model-cache chart
  and this template renders nothing.

  When externalModelCache is false, this chart creates its own SA using the
  serviceAccount block in values.yaml. The Workload Identity annotation
  (iam.gke.io/gcp-service-account) should be set in your cloud-specific
  values file.
*/ -}}
{{- if and (not .Values.externalModelCache) .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docling-serve.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}