{{- /*
  PersistentVolume for docling-serve model cache.

  When externalModelCache is true, the PV is created by the model-cache chart
  and this template renders nothing.

  When externalModelCache is false and persistence.create is true, this chart
  creates its own PV. The CSI block is cloud-specific and should be patched
  in by your cloud overlay.

  When externalModelCache is false and persistence.existingClaim is set, the
  PV is assumed to already exist externally — this template renders nothing.
*/ -}}
{{- if and (not .Values.externalModelCache) .Values.persistence.create (not .Values.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Release.Namespace }}-model-cache-pv
  labels:
    {{- include "docling-serve.labels" . | nindent 4 }}
    purpose: model-cache
    namespace: {{ .Release.Namespace }}
spec:
  capacity:
    storage: {{ .Values.persistence.size }}
  volumeMode: Filesystem
  accessModes:
    - {{ .Values.persistence.accessMode }}
  persistentVolumeReclaimPolicy: Retain
  storageClassName: {{ .Values.persistence.storageClass }}
  claimRef:
    namespace: {{ .Release.Namespace }}
    name: {{ printf "%s-cache" (include "docling-serve.fullname" .) }}
  # csi block is patched in by the cloud-specific overlay.
  # Do not add cloud-specific fields here.
{{- end }}