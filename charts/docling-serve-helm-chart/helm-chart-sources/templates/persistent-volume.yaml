{{- /*
  PersistentVolume for docling-serve model cache.

  Only rendered when persistence.existingClaim is NOT set and
  persistence.create is true. When existingClaim is set the PV is assumed
  to already exist externally (e.g. created by the model-cache chart).
*/ -}}
{{- if and (not .Values.persistence.existingClaim) .Values.persistence.create }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Release.Namespace }}-model-cache-pv
  labels:
    {{- include "docling-serve.labels" . | nindent 4 }}
    purpose: model-cache
    namespace: {{ .Release.Namespace }}
spec:
  capacity:
    storage: {{ .Values.persistence.size }}
  volumeMode: Filesystem
  accessModes:
    - {{ .Values.persistence.accessMode }}
  persistentVolumeReclaimPolicy: Retain
  storageClassName: {{ .Values.persistence.storageClass }}
  claimRef:
    namespace: {{ .Release.Namespace }}
    name: {{ printf "%s-cache" (include "docling-serve.fullname" .) }}
  # csi block is patched in by the cloud-specific overlay.
{{- end }}