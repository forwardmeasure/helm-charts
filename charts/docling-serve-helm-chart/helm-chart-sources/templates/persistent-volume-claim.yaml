{{- /*
  PersistentVolumeClaim for docling-serve model cache.

  Only rendered when persistence.existingClaim is NOT set and
  persistence.create is true. When existingClaim is set the PVC is assumed
  to already exist externally (e.g. created by the model-cache chart).
*/ -}}
{{- if and (not .Values.persistence.existingClaim) .Values.persistence.create }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ printf "%s-cache" (include "docling-serve.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docling-serve.labels" . | nindent 4 }}
    purpose: model-cache
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  storageClassName: {{ .Values.persistence.storageClass }}
  volumeName: {{ .Release.Namespace }}-model-cache-pv
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}