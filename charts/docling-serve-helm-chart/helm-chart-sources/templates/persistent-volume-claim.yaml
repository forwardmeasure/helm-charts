{{- /*
  PersistentVolumeClaim for docling-serve model cache.

  When externalModelCache is true, the PVC is created by the model-cache chart
  and this template renders nothing.

  When externalModelCache is false:
  - persistence.existingClaim is set → PVC already exists externally, skip creation
  - persistence.create is true → create a standalone PVC for dev/standalone use
  - persistence.create is false → no PVC created, user manages storage entirely
*/ -}}
{{- if and (not .Values.externalModelCache) .Values.persistence.create (not .Values.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ printf "%s-cache" (include "docling-serve.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docling-serve.labels" . | nindent 4 }}
    purpose: model-cache
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  storageClassName: {{ .Values.persistence.storageClass }}
  volumeName: {{ .Release.Namespace }}-model-cache-pv
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}