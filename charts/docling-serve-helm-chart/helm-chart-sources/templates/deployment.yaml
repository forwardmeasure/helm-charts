{{- $mode := .Values.mode -}}
{{- $pipeline := .Values.pipeline -}}

{{- if and (eq $mode "cpu") (eq $pipeline "vlm-large") -}}
{{- fail "Invalid configuration: cpu mode does not support vlm-large pipeline" -}}
{{- end }}

{{- $isGpu := eq $mode "gpu" -}}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "docling-serve.fullname" . }}
  labels:
    {{- include "docling-serve.labels" . | nindent 4 }}
  annotations:
    docling-serve/mode: {{ $mode | quote }}
    docling-serve/pipeline: {{ $pipeline | quote }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      {{- include "docling-serve.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "docling-serve.selectorLabels" . | nindent 8 }}
        docling-serve/mode: {{ $mode | quote }}
        docling-serve/pipeline: {{ $pipeline | quote }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}

      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- if $isGpu }}
      nodeSelector:
        {{- toYaml .Values.gpu.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.gpu.tolerations | nindent 8 }}
      {{- end }}

      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-cache" (include "docling-serve.fullname" .)) }}

        {{- if .Values.modelDownload.enabled }}
        - name: model-download-lib
          configMap:
            name: model-download-lib
            defaultMode: 0755
        # Local staging area for HuggingFace and docling-tools downloads.
        # GCS FUSE does not support chmod on in-flight .incomplete files and
        # returns EPERM, causing downloaders to stall. Staging to a local
        # emptyDir avoids this — completed model files are copied to the GCS
        # FUSE mount only after each download succeeds.
        - name: hf-download-staging
          emptyDir: {}
        {{- end }}

      # ---------------------------------------------------------------------
      # Init containers
      # ---------------------------------------------------------------------
      initContainers:

        {{- if .Values.initContainer.enabled }}
        - name: fix-permissions
          image: {{ .Values.initContainer.image }}
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p {{ .Values.paths.models }}
              chmod -R 0777 {{ .Values.paths.models }}
          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.paths.models }}
          securityContext:
            runAsUser: 0
          resources:
            {{- toYaml .Values.initContainer.resources | nindent 12 }}
        {{- end }}

        {{- if .Values.modelDownload.enabled }}
        - name: download-models
          image: {{ if $isGpu }}{{ .Values.modelDownload.image.gpu.repository }}:{{ .Values.modelDownload.image.gpu.tag }}{{ else }}{{ .Values.modelDownload.image.cpu.repository }}:{{ .Values.modelDownload.image.cpu.tag }}{{ end }}
          imagePullPolicy: {{ if $isGpu }}{{ .Values.modelDownload.image.gpu.pullPolicy }}{{ else }}{{ .Values.modelDownload.image.cpu.pullPolicy }}{{ end }}
          resources:
            {{- if $isGpu }}
            {{- toYaml .Values.modelDownload.resources.gpu | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.modelDownload.resources.cpu | nindent 12 }}
            {{- end }}
          env:
            # Redirect HuggingFace internal cache to local staging so that
            # .incomplete files and lock files never touch GCS FUSE.
            - name: HF_HOME
              value: /tmp/hf-staging/hf-home
            - name: HF_HUB_CACHE
              value: /tmp/hf-staging/hf-home
            - name: HF_HUB_DISABLE_SYMLINKS_WARNING
              value: "1"
            - name: HF_STAGING_ROOT
              value: /tmp/hf-staging
            # HuggingFace API token — required for higher rate limits and
            # authenticated access to gated models. Without this, downloads
            # of large model files are throttled and stall mid-stream.
            {{- if .Values.hfToken.secretName }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hfToken.secretName }}
                  key: {{ .Values.hfToken.secretKey }}
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hfToken.secretName }}
                  key: {{ .Values.hfToken.secretKey }}
            {{- end }}
          command: ["sh", "-c"]
          args:
            - |
              set -e
              . /scripts/model-download-lib.sh

              CACHE="{{ .Values.paths.models }}"
              WORKLOAD="docling-serve"

              echo "🚀 Starting model download for ${WORKLOAD}"
              echo "   GCS FUSE cache: ${CACHE}"
              echo "   Local staging:  ${HF_STAGING_ROOT}"

              # Always ensure ensemble models
              model_download_named "{{ join " " .Values.modelDownload.ensembleModels }}" "$CACHE" "$WORKLOAD"

              # VLM models (conditional on pipeline)
              if [ "{{ $pipeline }}" = "vlm-small" ]; then
                model_download_hf_repo "{{ index .Values.modelDownload.hfRepos "vlm-small" }}" "$CACHE" "$WORKLOAD"
              fi

              if [ "{{ $pipeline }}" = "vlm-large" ]; then
                model_download_hf_repo "{{ index .Values.modelDownload.hfRepos "vlm-large" }}" "$CACHE" "$WORKLOAD"
              fi

              # Write manifest
              model_write_manifest "$CACHE" "$WORKLOAD" \
                $(find "$CACHE" -mindepth 1 -maxdepth 1 -type d -exec basename {} \;)

              echo "✅ Model preparation complete"
          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.paths.models }}
            - name: model-download-lib
              mountPath: /scripts
            - name: hf-download-staging
              mountPath: /tmp/hf-staging
        {{- end }}

      containers:
        - name: docling-serve

          # ---------------------------------------------------------------
          # Image
          # ---------------------------------------------------------------
          image: "{{ if $isGpu }}{{ .Values.image.gpu.repository }}:{{ .Values.image.gpu.tag }}{{ else }}{{ .Values.image.cpu.repository }}:{{ .Values.image.cpu.tag }}{{ end }}"
          imagePullPolicy: {{ if $isGpu }}{{ .Values.image.gpu.pullPolicy }}{{ else }}{{ .Values.image.cpu.pullPolicy }}{{ end }}

          ports:
            - containerPort: {{ .Values.containerPort }}
              name: http

          # ---------------------------------------------------------------
          # Environment
          # ---------------------------------------------------------------
          env:
            - name: DOCLING_PROFILE
              value: {{ $pipeline | quote }}

            - name: DOCLING_SERVE_ARTIFACTS_PATH
              value: {{ .Values.paths.models | quote }}

            {{- if and (eq $mode "cpu") (eq $pipeline "vlm-small") }}
            - name: DOCLING_WARNING
              value: "Running vlm-small on CPU. Expect high latency."
            {{- end }}

            {{- if eq $pipeline "vlm-small" }}
            - name: DOCLING_VLM_MODEL_ID
              value: {{ (index .Values.pipelines "vlm-small").vlmModelId | quote }}
            {{- end }}

            {{- if eq $pipeline "vlm-large" }}
            - name: DOCLING_VLM_MODEL_ID
              value: {{ (index .Values.pipelines "vlm-large").vlmModelId | quote }}
            {{- end }}

            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}

            {{- if $isGpu }}
            {{- range $k, $v := .Values.gpuEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}

          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.paths.models }}

          # ---------------------------------------------------------------
          # Resources
          # ---------------------------------------------------------------
          resources:
            {{- $res := (index .Values.resources $mode $pipeline) }}
            requests:
              {{- toYaml $res.requests | nindent 14 }}
            limits:
              {{- toYaml $res.limits | nindent 14 }}
              {{- if $isGpu }}
              nvidia.com/gpu: {{ .Values.gpu.count }}
              {{- end }}

          # ---------------------------------------------------------------
          # Probes
          # ---------------------------------------------------------------
          startupProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            periodSeconds: 30
            failureThreshold: {{ (index .Values.resources $mode $pipeline).startupProbeFailureThreshold }}

          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ (index .Values.resources $mode $pipeline).livenessInitialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}

          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ (index .Values.resources $mode $pipeline).readinessInitialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}