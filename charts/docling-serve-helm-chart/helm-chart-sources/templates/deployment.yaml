apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "docling-serve.fullname" . }}
  labels:
    {{- include "docling-serve.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "docling-serve.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "docling-serve.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- if and .Values.gpu .Values.gpu.enabled }}
      # Pin to GPU node pool. Remove if your cluster uses a different scheduling mechanism.
      nodeSelector:
        {{- toYaml (.Values.gpu.nodeSelector | default dict) | nindent 8 }}
      tolerations:
        {{- toYaml (.Values.gpu.tolerations | default list) | nindent 8 }}
      runtimeClassName: nvidia
      {{- end }}

      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}

      initContainers:

        # Step 1: Fix ownership and permissions on the cache directories.
        - name: fix-cache-perms
          image: {{ .Values.initContainer.image }}
          command: ["sh", "-lc"]
          args:
            - |
              set -eux
              mkdir -p /cache/huggingface /cache/docling
              # 0777 is intentional: download-models and serve containers run as
              # non-root (UID 1001) and need write access to the root-owned PVC mount.
              chmod -R 0777 /cache
          volumeMounts:
            - name: hf-cache
              mountPath: {{ .Values.cache.mountPath }}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
          resources:
            {{- toYaml .Values.initContainer.resources | nindent 12 }}

        # Step 2: Download model weights if the checksum manifest is missing or invalid.
        # On a warm cache, checksum verification completes in seconds and the download is skipped.
        # On a cold cache or corrupt cache, models are re-downloaded and a fresh manifest is written.
        - name: download-models
          {{- if and .Values.gpu .Values.gpu.enabled }}
          image: "{{ .Values.models.cudaImage.repository }}:{{ .Values.models.cudaImage.tag }}"
          imagePullPolicy: {{ .Values.models.cudaImage.pullPolicy }}
          {{- else }}
          image: "{{ .Values.models.image.repository }}:{{ .Values.models.image.tag }}"
          imagePullPolicy: {{ .Values.models.image.pullPolicy }}
          {{- end }}
          resources:
            {{- toYaml .Values.models.resources | nindent 12 }}
            {{- if and .Values.gpu .Values.gpu.enabled }}
            limits:
              nvidia.com/gpu: {{ .Values.gpu.count | default 1 }}
            {{- end }}
          command: ["sh", "-lc"]
          args:
            - |
              set -eu

              CACHE_DIR="{{ .Values.cache.mountPath }}/docling/models"
              MANIFEST="${CACHE_DIR}/{{ .Values.models.checksumManifest }}"

              verify_manifest() {
                echo "Verifying model cache checksums..."
                if sha256sum -c "${MANIFEST}" --quiet 2>/dev/null; then
                  echo "Checksum verification passed. Skipping download."
                  return 0
                else
                  echo "Checksum verification FAILED. Cache is missing or corrupt."
                  return 1
                fi
              }

              download_models() {
                echo "Downloading models to ${CACHE_DIR}..."
                docling-tools models download \
                  --output-dir="${CACHE_DIR}" \
                  {{- range $i, $m := .Values.models.list }}
                  {{- if lt (add1 $i) (len $.Values.models.list) }}
                  {{ $m }} \
                  {{- else }}
                  {{ $m }}
                  {{- end }}
                  {{- end }}
                {{- range .Values.models.extras }}
                echo "Downloading HF repo {{ . }}..."
                docling-tools models download-hf-repo {{ . }} \
                  --output-dir="${CACHE_DIR}"
                {{- end }}

                echo "Generating checksum manifest at ${MANIFEST}..."
                find "${CACHE_DIR}" -type f ! -name "{{ .Values.models.checksumManifest }}" \
                  | sort \
                  | xargs sha256sum \
                  | sed "s|${CACHE_DIR}/||g" \
                  > "${MANIFEST}"
                echo "Manifest written with $(wc -l < "${MANIFEST}") entries."
              }

              mkdir -p "${CACHE_DIR}"
              cd "${CACHE_DIR}"

              if [ ! -f "${MANIFEST}" ]; then
                echo "No manifest found. Performing initial download."
                download_models
              elif ! verify_manifest; then
                echo "Re-downloading models due to verification failure."
                download_models
              else
                echo "Model cache is valid."
              fi
          volumeMounts:
            - name: hf-cache
              mountPath: {{ .Values.cache.mountPath }}

      containers:
        - name: docling-serve
          {{- if and .Values.gpu .Values.gpu.enabled }}
          image: "{{ .Values.gpu.cudaRepository | default "" }}:{{ .Values.gpu.cudaTag | default "" }}"
          {{- else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP

          env:
            - name: HF_HOME
              value: {{ .Values.env.HF_HOME | quote }}
            - name: HF_HUB_CACHE
              value: {{ .Values.env.HF_HUB_CACHE | quote }}
            - name: DOCLING_SERVE_ARTIFACTS_PATH
              value: {{ .Values.env.DOCLING_SERVE_ARTIFACTS_PATH | quote }}
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: {{ .Values.env.HF_HUB_ENABLE_HF_TRANSFER | quote }}
            - name: DOCLING_VLM_MODEL_ID
              value: {{ .Values.env.DOCLING_VLM_MODEL_ID | quote }}
            - name: DOCLING_CODEFORMULA_MODEL_ID
              value: {{ .Values.env.DOCLING_CODEFORMULA_MODEL_ID | quote }}
            - name: DOCLING_REPO_TYPE
              value: {{ .Values.env.DOCLING_REPO_TYPE | quote }}
            - name: DOCLING_SERVE_ENABLE_UI
              value: {{ .Values.env.DOCLING_SERVE_ENABLE_UI | quote }}
            - name: DOCLING_SERVE_LOAD_MODELS_AT_BOOT
              value: {{ .Values.env.DOCLING_SERVE_LOAD_MODELS_AT_BOOT | quote }}
            - name: DOCLING_SERVE_ENG_LOC_NUM_WORKERS
              value: {{ .Values.env.DOCLING_SERVE_ENG_LOC_NUM_WORKERS | quote }}
            - name: DOCLING_SERVE_ENG_LOC_SHARE_MODELS
              value: {{ .Values.env.DOCLING_SERVE_ENG_LOC_SHARE_MODELS | quote }}
            {{- if and .Values.gpu .Values.gpu.enabled }}
            - name: DOCLING_DEVICE
              value: {{ .Values.gpuEnv.DOCLING_DEVICE | quote }}
            - name: NVIDIA_VISIBLE_DEVICES
              value: {{ .Values.gpuEnv.NVIDIA_VISIBLE_DEVICES | quote }}
            - name: ORT_DISABLE_AZURE
              value: {{ .Values.gpuEnv.ORT_DISABLE_AZURE | quote }}
            - name: RAPIDOCR_ORT_PROVIDERS
              value: {{ .Values.gpuEnv.RAPIDOCR_ORT_PROVIDERS | quote }}
            - name: DOCLING_SERVE_LAYOUT_BATCH_SIZE
              value: {{ .Values.gpuEnv.DOCLING_SERVE_LAYOUT_BATCH_SIZE | quote }}
            - name: DOCLING_SERVE_TABLE_BATCH_SIZE
              value: {{ .Values.gpuEnv.DOCLING_SERVE_TABLE_BATCH_SIZE | quote }}
            - name: DOCLING_SERVE_OCR_BATCH_SIZE
              value: {{ .Values.gpuEnv.DOCLING_SERVE_OCR_BATCH_SIZE | quote }}
            {{- end }}

          volumeMounts:
            - name: hf-cache
              mountPath: {{ .Values.cache.mountPath }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
            {{- if and .Values.gpu .Values.gpu.enabled }}
            limits:
              nvidia.com/gpu: {{ .Values.gpu.count | default 1 }}
            {{- end }}

          # startupProbe gates liveness/readiness until the app is up.
          # failureThreshold * periodSeconds = max startup budget (20 * 30s = 10 min).
          # Loading granite_vision-3.3-2b on CPU can take several minutes.
          startupProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            periodSeconds: 30
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}