{{- $p := index .Values.profiles .Values.profile -}}
{{- $gpuEnabled := or $p.gpu (and .Values.gpu .Values.gpu.enabled) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "docling-serve.fullname" . }}
  labels:
    {{- include "docling-serve.labels" . | nindent 4 }}
  annotations:
    docling-serve/profile: {{ .Values.profile | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "docling-serve.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "docling-serve.selectorLabels" . | nindent 8 }}
        docling-serve/profile: {{ .Values.profile | quote }}
    spec:
      # SA created by this chart (serviceAccount.create: true) or
      # pre-existing (serviceAccount.create: false, e.g. from model-cache chart)
      serviceAccountName: {{ .Values.serviceAccount.name }}

      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- if $gpuEnabled }}
      nodeSelector:
        nvidia.com/gpu.product: {{ .Values.gpu.type | quote }}
        {{- range $k, $v := (.Values.gpu.nodeSelector | default dict) }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
      tolerations:
        {{- toYaml (.Values.gpu.tolerations | default list) | nindent 8 }}
      runtimeClassName: nvidia
      {{- end }}

      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-cache" (include "docling-serve.fullname" .)) }}
        - name: model-download-lib
          configMap:
            name: model-download-lib
            defaultMode: 0755

      initContainers:

        # Step 1: Fix permissions on the cache directory.
        - name: fix-cache-perms
          image: {{ .Values.initContainer.image }}
          command: ["sh", "-lc"]
          args:
            - |
              set -eux
              mkdir -p {{ .Values.env.DOCLING_SERVE_ARTIFACTS_PATH }}
              chmod -R 0777 {{ .Values.env.DOCLING_SERVE_ARTIFACTS_PATH }}
          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.cache.mountPath }}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
          resources:
            {{- toYaml .Values.initContainer.resources | nindent 12 }}

        # Step 2: Download model weights for profile {{ .Values.profile }}.
        # Sources model-download-lib.sh from ConfigMap for locking and
        # per-workload manifest logic. Models already present on the shared
        # PVC (downloaded by another workload) are skipped automatically.
        - name: download-models
          {{- if $gpuEnabled }}
          image: "{{ .Values.gpu.cudaImage.repository }}:{{ .Values.gpu.cudaImage.tag }}"
          imagePullPolicy: {{ .Values.gpu.cudaImage.pullPolicy }}
          {{- else }}
          image: "{{ .Values.models.image.repository }}:{{ .Values.models.image.tag }}"
          imagePullPolicy: {{ .Values.models.image.pullPolicy }}
          {{- end }}
          resources:
            {{- toYaml $p.modelDownloadResources | nindent 12 }}
            {{- if $gpuEnabled }}
            limits:
              nvidia.com/gpu: {{ .Values.gpu.count | default 1 }}
            {{- end }}
          env:
            - name: DOCLING_SERVE_ARTIFACTS_PATH
              value: {{ .Values.env.DOCLING_SERVE_ARTIFACTS_PATH | quote }}
            - name: PROFILE
              value: {{ .Values.profile | quote }}
          command: ["sh", "-lc"]
          args:
            - |
              set -eu
              . /scripts/model-download-lib.sh

              WORKLOAD="docling-serve"
              CACHE_DIR="{{ .Values.env.DOCLING_SERVE_ARTIFACTS_PATH }}"

              # Verify existing manifest - skip all downloads if valid
              if model_verify_manifest "${CACHE_DIR}" "${WORKLOAD}"; then
                echo "Model cache valid for ${WORKLOAD}. Nothing to do."
                exit 0
              fi

              echo "Downloading models for profile: {{ .Values.profile }}"

              # Download named tokens for this profile
              model_download_named \
                "{{- range $i, $m := $p.models }}{{ if $i }} {{ end }}{{ $m }}{{- end }}" \
                "${CACHE_DIR}" \
                "${WORKLOAD}"

              {{- range .Values.models.extras }}
              model_download_hf_repo "{{ . }}" "${CACHE_DIR}" "${WORKLOAD}"
              {{- end }}

              # Write per-workload manifest covering all model dirs
              model_write_manifest "${CACHE_DIR}" "${WORKLOAD}" \
                $(ls "${CACHE_DIR}" | grep -v '^\.' | tr '\n' ' ')

              echo "Download complete for ${WORKLOAD}."
          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.cache.mountPath }}
            - name: model-download-lib
              mountPath: /scripts

      containers:
        - name: docling-serve
          {{- if $gpuEnabled }}
          image: "{{ .Values.gpu.cudaImage.repository }}:{{ .Values.gpu.cudaImage.tag }}"
          imagePullPolicy: {{ .Values.gpu.cudaImage.pullPolicy }}
          {{- else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP

          env:
            - name: HF_HOME
              value: {{ .Values.env.HF_HOME | quote }}
            - name: HF_HUB_CACHE
              value: {{ .Values.env.HF_HUB_CACHE | quote }}
            - name: DOCLING_SERVE_ARTIFACTS_PATH
              value: {{ .Values.env.DOCLING_SERVE_ARTIFACTS_PATH | quote }}
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: {{ .Values.env.HF_HUB_ENABLE_HF_TRANSFER | quote }}
            - name: DOCLING_VLM_MODEL_ID
              value: {{ $p.vlmModelId | quote }}
            - name: DOCLING_CODEFORMULA_MODEL_ID
              value: {{ $p.codeformulaModelId | quote }}
            - name: DOCLING_REPO_TYPE
              value: {{ .Values.env.DOCLING_REPO_TYPE | quote }}
            - name: DOCLING_SERVE_ENABLE_UI
              value: {{ .Values.env.DOCLING_SERVE_ENABLE_UI | quote }}
            - name: DOCLING_SERVE_LOAD_MODELS_AT_BOOT
              value: {{ .Values.env.DOCLING_SERVE_LOAD_MODELS_AT_BOOT | quote }}
            - name: DOCLING_SERVE_ENG_LOC_NUM_WORKERS
              value: {{ .Values.env.DOCLING_SERVE_ENG_LOC_NUM_WORKERS | quote }}
            - name: DOCLING_SERVE_ENG_LOC_SHARE_MODELS
              value: {{ .Values.env.DOCLING_SERVE_ENG_LOC_SHARE_MODELS | quote }}
            {{- if $gpuEnabled }}
            - name: DOCLING_DEVICE
              value: {{ .Values.gpuEnv.DOCLING_DEVICE | quote }}
            - name: NVIDIA_VISIBLE_DEVICES
              value: {{ .Values.gpuEnv.NVIDIA_VISIBLE_DEVICES | quote }}
            - name: ORT_DISABLE_AZURE
              value: {{ .Values.gpuEnv.ORT_DISABLE_AZURE | quote }}
            - name: RAPIDOCR_ORT_PROVIDERS
              value: {{ .Values.gpuEnv.RAPIDOCR_ORT_PROVIDERS | quote }}
            - name: DOCLING_SERVE_LAYOUT_BATCH_SIZE
              value: {{ .Values.gpuEnv.DOCLING_SERVE_LAYOUT_BATCH_SIZE | quote }}
            - name: DOCLING_SERVE_TABLE_BATCH_SIZE
              value: {{ .Values.gpuEnv.DOCLING_SERVE_TABLE_BATCH_SIZE | quote }}
            - name: DOCLING_SERVE_OCR_BATCH_SIZE
              value: {{ .Values.gpuEnv.DOCLING_SERVE_OCR_BATCH_SIZE | quote }}
            {{- end }}

          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.cache.mountPath }}

          resources:
            {{- toYaml $p.resources | nindent 12 }}
            {{- if $gpuEnabled }}
            limits:
              nvidia.com/gpu: {{ .Values.gpu.count | default 1 }}
            {{- end }}

          # startupProbe gates liveness/readiness until the app is up.
          # Budget = startupProbeFailureThreshold * periodSeconds.
          # Profile {{ .Values.profile }} budget: {{ mul $p.startupProbeFailureThreshold 30 }}s
          startupProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            periodSeconds: 30
            failureThreshold: {{ $p.startupProbeFailureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ $p.livenessInitialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ $p.readinessInitialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}