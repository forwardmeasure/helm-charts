replicaCount: 1
nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Profile selects a pre-defined resource/model/image configuration bundle.
#
# Available profiles:
#   cpu-light  - CPU only, SmolVLM 256M picture description, low RAM.
#                Good for development, testing, or light workloads.
#   cpu-full   - CPU only, granite_vision 2B picture description, high RAM.
#                Production-grade quality without GPU infrastructure.
#   gpu-full   - CUDA image, granite_vision 2B, GPU node scheduling,
#                batch processing enabled. Best throughput and quality.
# ---------------------------------------------------------------------------
profile: cpu-light

image:
  repository: quay.io/docling-project/docling-serve
  tag: latest
  pullPolicy: IfNotPresent

containerPort: 5001

env:
  HF_HOME: /cache/huggingface
  HF_HUB_CACHE: /cache/huggingface
  DOCLING_SERVE_ARTIFACTS_PATH: /cache/docling/models
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  DOCLING_REPO_TYPE: model
  DOCLING_SERVE_ENABLE_UI: "1"
  DOCLING_SERVE_LOAD_MODELS_AT_BOOT: "1"
  DOCLING_SERVE_ENG_LOC_NUM_WORKERS: "1"
  DOCLING_SERVE_ENG_LOC_SHARE_MODELS: "true"

cache:
  mountPath: /cache

# ---------------------------------------------------------------------------
# External model cache
#
# When externalModelCache is true:
#   - SA, PV, and PVC are NOT created by this chart
#   - The chart assumes they already exist, created by the model-cache chart
#   - persistence and serviceAccount blocks below are ignored
#   - cache.pvcName and serviceAccount.externalName are used instead
#
# When externalModelCache is false (default):
#   - SA, PV, and PVC are created by this chart using the persistence
#     and serviceAccount blocks below
#   - Suitable for standalone/dev deployments without model-cache chart
# ---------------------------------------------------------------------------
externalModelCache: false

# Well-known names used when externalModelCache is true.
# These must match the names configured in the model-cache chart.
modelCache:
  pvcName: model-cache-pvc
  serviceAccountName: model-cache-sa

initContainer:
  image: alpine:3.20
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# ---------------------------------------------------------------------------
# GPU configuration - only active when profile=gpu-full or gpu.enabled=true.
# ---------------------------------------------------------------------------
gpu:
  enabled: false
  type: "NVIDIA-L4"
  count: 1
  nodeSelector:
    cloud.google.com/gke-accelerator: nvidia-l4
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  cudaImage:
    repository: quay.io/docling-project/docling-serve-cu128
    tag: main
    pullPolicy: IfNotPresent

gpuEnv:
  DOCLING_DEVICE: "cuda:0"
  NVIDIA_VISIBLE_DEVICES: "all"
  ORT_DISABLE_AZURE: "1"
  RAPIDOCR_ORT_PROVIDERS: "CUDAExecutionProvider,TensorrtExecutionProvider,CPUExecutionProvider"
  DOCLING_SERVE_LAYOUT_BATCH_SIZE: "64"
  DOCLING_SERVE_TABLE_BATCH_SIZE: "8"
  DOCLING_SERVE_OCR_BATCH_SIZE: "16"

# ---------------------------------------------------------------------------
# Per-profile configuration bundles.
# ---------------------------------------------------------------------------
profiles:
  cpu-light:
    vlmModelId: "HuggingFaceTB/SmolVLM-256M-Instruct"
    codeformulaModelId: "ds4sd/CodeFormulaV2"
    models:
      - layout
      - tableformer
      - code_formula
      - picture_classifier
      - easyocr
      - rapidocr
      - smolvlm
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 6Gi
    modelDownloadResources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    startupProbeFailureThreshold: 10
    livenessInitialDelaySeconds: 60
    readinessInitialDelaySeconds: 30
    gpu: false

  cpu-full:
    vlmModelId: "ibm-granite/granite-vision-3.3-2b"
    codeformulaModelId: "ds4sd/CodeFormulaV2"
    models:
      - layout
      - tableformer
      - code_formula
      - picture_classifier
      - easyocr
      - rapidocr
      - granite_vision
      - smoldocling
      - smolvlm
    resources:
      requests:
        cpu: 500m
        memory: 6Gi
      limits:
        cpu: 4000m
        memory: 16Gi
    modelDownloadResources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 6Gi
    startupProbeFailureThreshold: 20
    livenessInitialDelaySeconds: 180
    readinessInitialDelaySeconds: 120
    gpu: false

  gpu-full:
    vlmModelId: "ibm-granite/granite-vision-3.3-2b"
    codeformulaModelId: "ds4sd/CodeFormulaV2"
    models:
      - layout
      - tableformer
      - code_formula
      - picture_classifier
      - easyocr
      - rapidocr
      - granite_vision
      - smoldocling
      - smolvlm
    resources:
      requests:
        cpu: 500m
        memory: 8Gi
      limits:
        cpu: 4000m
        memory: 16Gi
    modelDownloadResources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 6Gi
    startupProbeFailureThreshold: 6
    livenessInitialDelaySeconds: 60
    readinessInitialDelaySeconds: 30
    gpu: true

probes:
  liveness:
    path: /health
    periodSeconds: 30
    failureThreshold: 3
  readiness:
    path: /health
    periodSeconds: 10
    failureThreshold: 3

service:
  type: ClusterIP
  port: 5001
  name: http

models:
  image:
    repository: quay.io/docling-project/docling-serve-cpu
    tag: main
    pullPolicy: IfNotPresent
  list: []
  extras: []
  checksumManifest: ".model-manifest.sha256"
  resources: {}

# Used when externalModelCache is false
persistence:
  existingClaim: ""
  create: false
  accessMode: ReadWriteOnce
  size: 64Gi
  storageClass: ""

# Used when externalModelCache is false
serviceAccount:
  create: true
  name: model-cache-sa
  annotations: {}
