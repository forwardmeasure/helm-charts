replicaCount: 1
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

# ---------------------------------------------------------------------------
# Runtime mode and pipeline selection
#
# Supported combinations:
#
#   mode=cpu, pipeline=standard    ✅
#   mode=cpu, pipeline=vlm-small   ✅
#   mode=cpu, pipeline=vlm-large   ❌
#
#   mode=gpu, pipeline=standard    ✅
#   mode=gpu, pipeline=vlm-small   ✅
#   mode=gpu, pipeline=vlm-large   ✅
#
# Notes:
# - vlm-small on CPU is supported but expected to be slow.
# - vlm-large is GPU-only by design.
# ---------------------------------------------------------------------------
mode: cpu
pipeline: standard

image:
  cpu:
    repository: quay.io/docling-project/docling-serve-cpu
    tag: v1.16.1
    pullPolicy: IfNotPresent
  gpu:
    repository: quay.io/docling-project/docling-serve-cu128
    tag: v1.16.1
    pullPolicy: IfNotPresent

containerPort: 5001

env:
  HF_HOME: /opt/docling-serve/cache/huggingface
  HF_HUB_CACHE: /opt/docling-serve/cache/huggingface
  DOCLING_SERVE_ARTIFACTS_PATH: /opt/docling-serve/models
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  DOCLING_REPO_TYPE: model
  DOCLING_SERVE_ENABLE_UI: "1"
  DOCLING_SERVE_LOAD_MODELS_AT_BOOT: "1"
  DOCLING_SERVE_ENG_LOC_NUM_WORKERS: "1"
  DOCLING_SERVE_ENG_LOC_SHARE_MODELS: "true"

# ---------------------------------------------------------------------------
# Mounted model store and optional cache
# ---------------------------------------------------------------------------
paths:
  models: /opt/docling-serve/models
  cache: /opt/docling-serve/cache

# ---------------------------------------------------------------------------
# Persistence
#
# Two valid configurations:
#
# 1. existingClaim is set — use a pre-existing PVC.
# 2. existingClaim is empty and create: true — this chart creates its own PV/PVC.
#
# existingClaim takes precedence over create.
# ---------------------------------------------------------------------------
persistence:
  existingClaim: ""
  create: true
  accessMode: ReadWriteOnce
  size: 64Gi
  storageClass: ""

# ---------------------------------------------------------------------------
# ServiceAccount
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: model-cache-sa
  annotations: {}

# ---------------------------------------------------------------------------
# Optional init container used for permission fixups
# ---------------------------------------------------------------------------
initContainer:
  enabled: true
  image: alpine:3.20
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# ---------------------------------------------------------------------------
# Optional model download job inside the pod.
#
# Preferred production approach:
#   enabled: false
# and mount a PVC that already contains the model weights.
#
# Set enabled: true only if you want this chart to populate the PVC.
# ---------------------------------------------------------------------------
modelDownload:
  enabled: false
  image:
    cpu:
      repository: quay.io/docling-project/docling-serve-cpu
      tag: v1.16.1
      pullPolicy: IfNotPresent
    gpu:
      repository: quay.io/docling-project/docling-serve-cu128
      tag: v1.16.1
      pullPolicy: IfNotPresent
  resources:
    cpu:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    gpu:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 6Gi

  # Named docling-tools model tokens to download for the ensemble pipeline.
  ensembleModels:
    - layout
    - tableformer
    - code_formula
    - picture_classifier
    - easyocr
    - rapidocr

  # Hugging Face repos to download for VLM pipelines.
  hfRepos:
    vlm-small: "ibm-granite/granite-docling-258M"
    vlm-large: "ibm-granite/granite-4.0-3b-vision"

# ---------------------------------------------------------------------------
# GPU configuration
#
# Only active when mode=gpu.
# ---------------------------------------------------------------------------
gpu:
  count: 1
  nodeSelector:
    cloud.google.com/gke-accelerator: nvidia-l4
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule

gpuEnv:
  LD_LIBRARY_PATH: "/usr/local/nvidia/lib64:/opt/app-root/lib/python3.12/site-packages/nvidia/cuda_runtime/lib"
  DOCLING_DEVICE: "cuda:0"
  NVIDIA_VISIBLE_DEVICES: "all"
  ORT_DISABLE_AZURE: "1"
  RAPIDOCR_ORT_PROVIDERS: "CUDAExecutionProvider,TensorrtExecutionProvider,CPUExecutionProvider"
  DOCLING_SERVE_LAYOUT_BATCH_SIZE: "64"
  DOCLING_SERVE_TABLE_BATCH_SIZE: "8"
  DOCLING_SERVE_OCR_BATCH_SIZE: "16"

# ---------------------------------------------------------------------------
# Per-mode and per-pipeline resources / startup behavior
# ---------------------------------------------------------------------------
resources:
  cpu:
    standard:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 6Gi
      startupProbeFailureThreshold: 10
      livenessInitialDelaySeconds: 60
      readinessInitialDelaySeconds: 30

    vlm-small:
      requests:
        cpu: 1000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 12Gi
      startupProbeFailureThreshold: 20
      livenessInitialDelaySeconds: 180
      readinessInitialDelaySeconds: 120

  gpu:
    standard:
      requests:
        cpu: 500m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 12Gi
      startupProbeFailureThreshold: 10
      livenessInitialDelaySeconds: 60
      readinessInitialDelaySeconds: 30

    vlm-small:
      requests:
        cpu: 1000m
        memory: 8Gi
      limits:
        cpu: 4000m
        memory: 16Gi
      startupProbeFailureThreshold: 8
      livenessInitialDelaySeconds: 60
      readinessInitialDelaySeconds: 30

    vlm-large:
      requests:
        cpu: 2000m
        memory: 16Gi
      limits:
        cpu: 8000m
        memory: 32Gi
      startupProbeFailureThreshold: 10
      livenessInitialDelaySeconds: 120
      readinessInitialDelaySeconds: 60

# ---------------------------------------------------------------------------
# Pipeline-to-model mapping
#
# These are runtime identifiers the deployment template can use to set env vars.
# They should correspond to directories present under /opt/docling-serve/models
# when models are mounted from PVC.
# ---------------------------------------------------------------------------
pipelines:
  standard:
    type: ensemble
    vlmModelId: ""
  vlm-small:
    type: vlm
    vlmModelId: "ibm-granite/granite-docling-258M"
  vlm-large:
    type: vlm
    vlmModelId: "ibm-granite/granite-4.0-3b-vision"

probes:
  liveness:
    path: /health
    periodSeconds: 30
    failureThreshold: 3
  readiness:
    path: /health
    periodSeconds: 10
    failureThreshold: 3

service:
  type: ClusterIP
  port: 5001
  name: http

# ---------------------------------------------------------------------------
# HuggingFace token
#
# When secretName is set the chart injects HF_TOKEN and
# HUGGING_FACE_HUB_TOKEN into the download-models init container.
# Required for authenticated downloads and gated models.
# The secret is owned by platform-secrets and created via ESO.
# Leave secretName empty to disable token injection.
# ---------------------------------------------------------------------------
hfToken:
  secretName: ""
  secretKey: token
