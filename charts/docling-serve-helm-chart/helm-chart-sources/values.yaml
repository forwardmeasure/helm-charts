replicaCount: 1
nameOverride: ""
fullnameOverride: ""

image:
  repository: quay.io/docling-project/docling-serve
  # NOTE: Pin to a specific tag or SHA digest in production, e.g.:
  #   tag: "0.4.0"
  #   tag: "sha256:abc123..."
  tag: latest
  pullPolicy: IfNotPresent

# imagePullSecrets:
#   - name: my-registry-secret

containerPort: 5001

env:
  HF_HOME: /cache/huggingface
  HF_HUB_CACHE: /cache/huggingface
  # DOCLING_SERVE_ARTIFACTS_PATH is the correct env var recognised by docling-serve.
  # DOCLING_ARTIFACTS_PATH is NOT recognised and will be silently ignored, causing
  # the serve container to fall back to its internal default path.
  DOCLING_SERVE_ARTIFACTS_PATH: /cache/docling/models
  # Requires hf_transfer to be installed in the container image.
  # Verify the docling-serve image includes it before enabling.
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  # granite_vision token downloads ibm-granite/granite-vision-3.3-2b for picture description.
  DOCLING_VLM_MODEL_ID: ibm-granite/granite-vision-3.3-2b
  DOCLING_CODEFORMULA_MODEL_ID: ds4sd/CodeFormulaV2
  DOCLING_REPO_TYPE: model
  DOCLING_SERVE_ENABLE_UI: "1"
  DOCLING_SERVE_LOAD_MODELS_AT_BOOT: "1"
  DOCLING_SERVE_ENG_LOC_NUM_WORKERS: "1"
  DOCLING_SERVE_ENG_LOC_SHARE_MODELS: "true"

cache:
  mountPath: /cache

initContainer:
  image: alpine:3.20
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: 2000m
    memory: 8Gi

probes:
  liveness:
    path: /health
    initialDelaySeconds: 60
    periodSeconds: 30
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

service:
  type: ClusterIP
  port: 5001
  name: http

models:
  image:
    repository: ghcr.io/docling-project/docling-serve-cpu
    tag: main
    pullPolicy: IfNotPresent
  # Named model tokens passed to: docling-tools models download --output-dir=...
  # Full token list (current docling-tools version):
  #   layout, tableformer, code_formula, picture_classifier,
  #   smolvlm, granitedocling, granitedocling_mlx, smoldocling, smoldocling_mlx,
  #   granite_vision, granite_chart_extraction, rapidocr, easyocr
  list:
    - layout
    - tableformer
    - code_formula # also covers CodeFormulaV2 (ds4sd/CodeFormulaV2)
    - picture_classifier
    - easyocr
    - rapidocr
    - granite_vision # ibm-granite/granite-vision-3.3-2b  -> DOCLING_VLM_MODEL_ID
    - smoldocling # ibm-granite/granite-docling-258M   -> full-page VLM pipeline
  # HuggingFace repos downloaded directly via: docling-tools models download-hf-repo
  # Only needed for models not available as named tokens above.
  extras: []
  checksumManifest: ".model-manifest.sha256"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

persistence:
  create: true
  existingClaim: docling-cache-pvc
  accessMode: ReadWriteOnce
  size: 50Gi
  storageClass: ""
