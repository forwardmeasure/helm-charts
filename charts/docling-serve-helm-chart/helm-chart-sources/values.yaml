replicaCount: 1
nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Profile selects a pre-defined resource/model/image configuration bundle.
#
# Available profiles:
#   cpu-light  - CPU only, SmolVLM 256M picture description, low RAM.
#                Good for development, testing, or light workloads.
#   cpu-full   - CPU only, granite_vision 2B picture description, high RAM.
#                Production-grade quality without GPU infrastructure.
#   gpu-full   - CUDA image, granite_vision 2B, GPU node scheduling,
#                batch processing enabled. Best throughput and quality.
#
# Profile values are defaults. Individual keys in values.yaml (and Kustomize
# --set overrides) take precedence over profile-derived values where the
# template supports it.
# ---------------------------------------------------------------------------
profile: cpu-light

image:
  repository: quay.io/docling-project/docling-serve
  # NOTE: Pin to a specific tag or SHA digest in production, e.g.:
  #   tag: "0.4.0"
  #   tag: "sha256:abc123..."
  tag: latest
  pullPolicy: IfNotPresent

# imagePullSecrets:
#   - name: my-registry-secret

containerPort: 5001

env:
  HF_HOME: /cache/huggingface
  HF_HUB_CACHE: /cache/huggingface
  # DOCLING_SERVE_ARTIFACTS_PATH is the correct env var recognised by docling-serve.
  # DOCLING_ARTIFACTS_PATH is NOT recognised and will be silently ignored, causing
  # the serve container to fall back to its internal default path.
  DOCLING_SERVE_ARTIFACTS_PATH: /cache/docling/models
  # Requires hf_transfer to be installed in the container image.
  # Verify the docling-serve image includes it before enabling.
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  DOCLING_REPO_TYPE: model
  DOCLING_SERVE_ENABLE_UI: "1"
  DOCLING_SERVE_LOAD_MODELS_AT_BOOT: "1"
  DOCLING_SERVE_ENG_LOC_NUM_WORKERS: "1"
  DOCLING_SERVE_ENG_LOC_SHARE_MODELS: "true"

cache:
  mountPath: /cache

initContainer:
  image: alpine:3.20
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# ---------------------------------------------------------------------------
# GPU configuration - only active when profile=gpu-full or gpu.enabled=true.
#
# gpu.type sets nvidia.com/gpu.product nodeSelector (cloud-agnostic, requires
# NVIDIA GPU Operator). Override gpu.nodeSelector directly for clouds that do
# not use the GPU Operator label convention.
#
# Default nodeSelector includes the GKE accelerator label. Override this in
# your cloud-specific Kustomize overlay, e.g. for EKS:
#   --set 'gpu.nodeSelector.cloud\.google\.com/gke-accelerator=null'
#   --set 'gpu.nodeSelector.karpenter\.k8s\.aws/instance-gpu-name=l4'
# ---------------------------------------------------------------------------
gpu:
  enabled: false
  # GPU model - maps to nvidia.com/gpu.product label via NVIDIA GPU Operator.
  # Common values: NVIDIA-L4, NVIDIA-A100-SXM4-80GB, Tesla-T4
  type: "NVIDIA-L4"
  count: 1
  # GKE-specific accelerator label. Override per cloud in your Kustomize overlay.
  nodeSelector:
    cloud.google.com/gke-accelerator: nvidia-l4
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  cudaImage:
    repository: quay.io/docling-project/docling-serve-cu128
    tag: main
    pullPolicy: IfNotPresent

# GPU-specific environment variables - only injected when gpu.enabled=true.
gpuEnv:
  DOCLING_DEVICE: "cuda:0"
  NVIDIA_VISIBLE_DEVICES: "all"
  ORT_DISABLE_AZURE: "1"
  RAPIDOCR_ORT_PROVIDERS: "CUDAExecutionProvider,TensorrtExecutionProvider,CPUExecutionProvider"
  DOCLING_SERVE_LAYOUT_BATCH_SIZE: "64"
  DOCLING_SERVE_TABLE_BATCH_SIZE: "8"
  DOCLING_SERVE_OCR_BATCH_SIZE: "16"

# ---------------------------------------------------------------------------
# Per-profile configuration bundles.
# These are consumed by the deployment template via the profile key above.
# To override a specific value for your environment, use Kustomize --set on
# the top-level key (e.g. resources.limits.memory) rather than editing here.
# ---------------------------------------------------------------------------
profiles:
  cpu-light:
    vlmModelId: "HuggingFaceTB/SmolVLM-256M-Instruct"
    codeformulaModelId: "ds4sd/CodeFormulaV2"
    models:
      - layout
      - tableformer
      - code_formula
      - picture_classifier
      - easyocr
      - rapidocr
      - smolvlm
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 6Gi
    modelDownloadResources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    startupProbeFailureThreshold: 10 # 10 * 30s = 5 min budget
    livenessInitialDelaySeconds: 60
    readinessInitialDelaySeconds: 30
    gpu: false

  cpu-full:
    vlmModelId: "ibm-granite/granite-vision-3.3-2b"
    codeformulaModelId: "ds4sd/CodeFormulaV2"
    models:
      - layout
      - tableformer
      - code_formula
      - picture_classifier
      - easyocr
      - rapidocr
      - granite_vision
      - smoldocling
      - smolvlm # UI default; kept so Gradio interface works without model override
    resources:
      requests:
        cpu: 500m
        memory: 6Gi
      limits:
        cpu: 4000m
        memory: 16Gi
    modelDownloadResources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 6Gi
    startupProbeFailureThreshold: 20 # 20 * 30s = 10 min budget
    livenessInitialDelaySeconds: 180
    readinessInitialDelaySeconds: 120
    gpu: false

  gpu-full:
    vlmModelId: "ibm-granite/granite-vision-3.3-2b"
    codeformulaModelId: "ds4sd/CodeFormulaV2"
    models:
      - layout
      - tableformer
      - code_formula
      - picture_classifier
      - easyocr
      - rapidocr
      - granite_vision
      - smoldocling
      - smolvlm # UI default; kept so Gradio interface works without model override
    resources:
      requests:
        cpu: 500m
        memory: 8Gi
      limits:
        cpu: 4000m
        memory: 16Gi
    modelDownloadResources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 6Gi
    startupProbeFailureThreshold: 6 # 6 * 30s = 3 min budget (GPU loads fast)
    livenessInitialDelaySeconds: 60
    readinessInitialDelaySeconds: 30
    gpu: true

probes:
  liveness:
    path: /health
    periodSeconds: 30
    failureThreshold: 3
  readiness:
    path: /health
    periodSeconds: 10
    failureThreshold: 3

service:
  type: ClusterIP
  port: 5001
  name: http

models:
  image:
    repository: ghcr.io/docling-project/docling-serve-cpu
    tag: main
    pullPolicy: IfNotPresent
  # Named model tokens passed to: docling-tools models download --output-dir=...
  # Full token list (current docling-tools version):
  #   layout, tableformer, code_formula, picture_classifier,
  #   smolvlm, granitedocling, granitedocling_mlx, smoldocling, smoldocling_mlx,
  #   granite_vision, granite_chart_extraction, rapidocr, easyocr
  # NOTE: This list is driven by the active profile. Edit profiles.<n>.models
  # above to change the model set for a given profile.
  list: []
  # HuggingFace repos downloaded directly via: docling-tools models download-hf-repo
  # Only needed for models not available as named tokens above.
  extras: []
  checksumManifest: ".model-manifest.sha256"
  resources: {}

persistence:
  create: true
  existingClaim: docling-cache-pvc
  accessMode: ReadWriteOnce
  size: 50Gi
  storageClass: ""
