apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "zookeeper.fullname" . }}
  labels:
    {{- include "zookeeper.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "zookeeper.headlessName" . }}
  replicas: {{ .Values.replicaCount }}

  # MUST be minimal + stable and must match pod template labels.
  selector:
    matchLabels:
      {{- include "zookeeper.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "zookeeper.selectorLabels" . | nindent 8 }}
        {{- include "zookeeper.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "zookeeper.serviceAccountName" . }}

      initContainers:
        - name: set-myid
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              ORDINAL="$(hostname | awk -F'-' '{print $NF}')"
              MY_ID=$((ORDINAL + 1))
              echo "Setting myid=${MY_ID} in /data/myid"
              echo "${MY_ID}" > /data/myid
          volumeMounts:
            - name: data
              mountPath: /data

      containers:
        - name: zookeeper
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
{{ toYaml .Values.resources | indent 12 }}

          env:
            - name: ZOOKEEPERTICKTIME
              value: "{{ .Values.zookeeperConfig.tickTime }}"
            - name: ZOOKEEPERINITLIMIT
              value: "{{ .Values.zookeeperConfig.initLimit }}"
            - name: ZOOKEEPERSYNCLIMIT
              value: "{{ .Values.zookeeperConfig.syncLimit }}"
            - name: ZOOKEEPERAUTOPURGEPURGEINTERVAL
              value: "{{ .Values.zookeeperConfig.autopurgePurgeInterval }}"
            - name: ZOOKEEPERAUTOPURGESNAPRETAINCOUNT
              value: "{{ .Values.zookeeperConfig.autopurgeSnapRetainCount }}"
            - name: ZOOKEEPERMAXCLIENTCNXNS
              value: "{{ .Values.zookeeperConfig.maxClientCnxns }}"

          ports:
            - name: client
              containerPort: {{ .Values.service.ports.client }}
            - name: quorum
              containerPort: {{ .Values.service.ports.quorum }}
            - name: election
              containerPort: {{ .Values.service.ports.election }}

          volumeMounts:
            - name: config
              mountPath: /conf/zoo.cfg
              subPath: zoo.cfg
            - name: data
              mountPath: /data
            - name: datalog
              mountPath: /datalog

      volumes:
        - name: config
          configMap:
            name: {{ include "zookeeper.fullname" . }}-config
        - name: datalog
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
