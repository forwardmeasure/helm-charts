replicaCount: 3
image:
  registry: docker.io
  repository: zookeeper
  tag: 3.9.4
  pullPolicy: Always

service:
  type: ClusterIP
  ports:
    client: 2181
    quorum: 2888
    election: 3888

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: 1
    memory: 4Gi

persistence:
  enabled: true
  storageClass: "standard-rwo"
  size: 50Gi

zookeeperConfig:
  tickTime: 2000
  initLimit: 10
  syncLimit: 5
  autopurgePurgeInterval: 1
  autopurgeSnapRetainCount: 10
  maxClientCnxns: 60

networkPolicy:
  enabled: true

podDisruptionBudget:
  enabled: true
  minAvailable: 2

affinity:
  podAntiAffinityPreset: hard

serviceAccount:
  create: true
  name: ""
  automount: true
  annotations: {}

nodeSelector: {}
tolerations: []
