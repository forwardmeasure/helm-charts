{{- range .Values.models }}
{{- if .enabled }}
{{- include "kserve-model-serving.validateModel" (dict "model" . "Values" $.Values) }}
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "kserve-model-serving.labels" $ | nindent 4 }}
    app.kubernetes.io/component: model-serving
    kserve-model-serving/runtime: {{ .runtime }}
    kserve-model-serving/family: {{ $.Release.Name }}
  annotations:
    serving.kserve.io/deploymentMode: {{ $.Values.deploymentMode | quote }}
    serving.kserve.io/deploymentRevision: {{ $.Chart.Version | quote }}
{{- with $.Values.podAnnotations }}
    {{- toYaml . | nindent 4 }}
{{- end }}
{{- if $.Values.externalModelCache }}
{{- with $.Values.modelCachePodAnnotations }}
    {{- toYaml . | nindent 4 }}
{{- end }}
{{- end }}
spec:
  predictor:
    serviceAccountName: {{ if $.Values.externalModelCache }}{{ include "kserve-model-serving.serviceAccountName" (dict "model" . "Values" $.Values) }}{{ else }}{{ $.Values.serviceAccount.name }}{{ end }}
    minReplicas: {{ .scaling.minReplicas | default 0 }}
    maxReplicas: {{ .scaling.maxReplicas | default 1 }}
    timeout: {{ .scaling.timeoutSeconds | default 1800 }}
{{- with .nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
{{- end }}
{{- with .tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
{{- end }}
{{- if $.Values.externalModelCache }}
    volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: {{ include "kserve-model-serving.pvcName" (dict "model" . "Values" $.Values) }}
    initContainers:
      - name: download-models
        image: {{ include "kserve-model-serving.downloadImage" (dict "model" . "Values" $.Values) }}
        imagePullPolicy: {{ $.Values.modelDownload.image.pullPolicy }}
        resources:
{{- if and (hasKey . "modelDownload") (hasKey .modelDownload "resources") }}
{{- toYaml .modelDownload.resources | nindent 10 }}
{{- else }}
{{- toYaml $.Values.modelDownload.resources | nindent 10 }}
{{- end }}
{{- if $.Values.huggingFace.token.secretName }}
        env:
          - name: HUGGING_FACE_HUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: {{ $.Values.huggingFace.token.secretName }}
                key: {{ $.Values.huggingFace.token.secretKey }}
{{- end }}
        command:
          - /usr/local/lib/model-download-lib.sh
          - {{ .huggingFaceRepo | quote }}
          - {{ $.Values.modelCache.mountPath | quote }}
          - {{ printf "%s-%s" $.Release.Name .name | quote }}
          - {{ include "kserve-model-serving.skipVerification" (dict "model" . "Values" $.Values) | quote }}
        volumeMounts:
          - name: model-cache
            mountPath: {{ $.Values.modelCache.mountPath }}
{{- end }}
    model:
      modelFormat:
        name: {{ .runtime }}
      runtime: {{ if eq .runtime "vllm" }}kserve-vllmserver{{ else if eq .runtime "huggingface" }}kserve-huggingfaceserver{{ else if eq .runtime "triton" }}kserve-tritonserver{{ else }}{{ .runtime }}{{ end }}
{{- if $.Values.externalModelCache }}
      {{- /* No storageUri — model pre-loaded by init container, storage initializer bypassed */ -}}
{{- else }}
      storageUri: "hf://{{ .huggingFaceRepo }}"
{{- end }}
      resources:
        requests:
          cpu: {{ .resources.requests.cpu | quote }}
          memory: {{ .resources.requests.memory }}
{{- if gt (int (.gpu | default 0)) 0 }}
          nvidia.com/gpu: {{ .gpu | quote }}
{{- end }}
        limits:
          cpu: {{ .resources.limits.cpu | quote }}
          memory: {{ .resources.limits.memory }}
{{- if gt (int (.gpu | default 0)) 0 }}
          nvidia.com/gpu: {{ .gpu | quote }}
{{- end }}
      args:
{{- if $.Values.externalModelCache }}
        - --model_id={{ $.Values.modelCache.mountPath }}/{{ .huggingFaceRepo | replace "/" "--" }}
{{- end }}
{{- with .args }}
{{- toYaml . | nindent 8 }}
{{- end }}
      env:
{{- if $.Values.huggingFace.token.secretName }}
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.huggingFace.token.secretName }}
              key: {{ $.Values.huggingFace.token.secretKey }}
{{- end }}
{{- range $key, $val := .env }}
        - name: {{ $key }}
          value: {{ $val | quote }}
{{- end }}
{{- if $.Values.externalModelCache }}
      volumeMounts:
        - name: model-cache
          mountPath: {{ $.Values.modelCache.mountPath }}
{{- if or (eq $.Values.deploymentMode "Serverless") ($.Values.modelCache.readOnlyForServing) }}
          readOnly: true
{{- end }}
{{- end }}
{{- end }}
{{- end }}