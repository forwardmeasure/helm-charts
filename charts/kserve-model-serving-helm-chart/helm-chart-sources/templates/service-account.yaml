{{- if .Values.serviceAccount.create }}
# ---------------------------------------------------------------------------
# ServiceAccount for KServe model serving pods.
# create: true — this chart creates the SA using name and annotations.
# create: false — use a pre-existing SA (e.g. from model-cache chart when
#                 externalModelCache is true). name must still be set so the
#                 InferenceService predictor references the correct SA.
# On GCP: annotate with iam.gke.io/gcp-service-account for Workload Identity
# to allow GCS model cache access.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kserve-model-serving.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- /*
Patch imagePullSecrets onto the SA regardless of create: true/false.
Covers pre-existing SAs (e.g. model-cache-sa) that need private registry
access without this chart needing to own the SA lifecycle.
*/}}
{{- if .Values.imagePullSecrets }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
imagePullSecrets:
  {{- toYaml .Values.imagePullSecrets | nindent 2 }}
{{- end }}