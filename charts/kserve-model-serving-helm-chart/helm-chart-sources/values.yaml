# ==============================================================================
# kserve-model-serving chart values
# ==============================================================================

nameOverride: ""
fullnameOverride: ""

deploymentMode: "Serverless"

# Pod annotations applied to InferenceService predictor pods.
# On GCP override with gke-gcsfuse/volumes: "true" to enable GCS FUSE sidecar
# and traffic.sidecar.istio.io/excludeInboundPorts: "8080" for Istio probes.
podAnnotations: {}

# Pod annotations applied only when externalModelCache is true.
# On GCP add gke-gcsfuse/volumes: "true" to enable GCS FUSE sidecar.
modelCachePodAnnotations: {}

# ------------------------------------------------------------------------------
# ServiceAccount
# create: true — this chart creates its own SA using name and annotations.
# create: false — use a pre-existing SA (e.g. from model-cache chart when
#                 externalModelCache is true). name must still be set.
# On GCP with externalModelCache: true, set create: false and name to the
# model-cache SA which already has Workload Identity for GCS access.
# ------------------------------------------------------------------------------
serviceAccount:
  create: true
  name: kserve-serving-sa
  annotations: {}
  # GCP Workload Identity example:
  # annotations:
  #   iam.gke.io/gcp-service-account: <sa-name>@<project>.iam.gserviceaccount.com

# ------------------------------------------------------------------------------
# Image pull secrets
# Applied to:
# 1. the ServiceAccount when this chart creates it
# 2. the KServe predictor spec so pods can pull private images even when using
#    a pre-existing ServiceAccount
# ------------------------------------------------------------------------------
imagePullSecrets: []
# Example:
# imagePullSecrets:
#   - name: my-registry-secret

# ------------------------------------------------------------------------------
# HuggingFace token
# Required for gated models (Gemma, some Phi variants).
# Public models (Granite, most Phi) do not need a token.
# secretName: name of an existing Kubernetes Secret containing the token.
# secretKey:  key within the secret that holds the token value.
# When secretName is empty, no token is injected.
# ------------------------------------------------------------------------------
huggingFace:
  token:
    secretName: ""
    secretKey: token

# ------------------------------------------------------------------------------
# Model cache integration
# When externalModelCache is true, models are loaded from the shared GCS-backed
# PVC created by the model-cache chart. The init container downloads model
# weights before the inference container starts.
# When externalModelCache is false, KServe's built-in storage initializer
# downloads models directly from HuggingFace Hub at pod start.
# ------------------------------------------------------------------------------
externalModelCache: false

modelCache:
  pvcName: model-cache-pvc
  serviceAccountName: model-cache-sa
  mountPath: /mnt/models/cache
  skipManifestVerification: false

# ------------------------------------------------------------------------------
# Model download init container
# Only used when externalModelCache is true.
# ------------------------------------------------------------------------------
modelDownload:
  image:
    registry: docker.io
    repository: forwardmeasure/ml-model-utilities
    tag: "latest"
    digest: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 6Gi

# ------------------------------------------------------------------------------
# vLLM ClusterServingRuntime
# Set enabled: true only for the first model family release (granite-serving).
# ClusterServingRuntime is cluster-scoped — only needs deploying once.
# ------------------------------------------------------------------------------
vllmRuntime:
  enabled: true
  image:
    repository: vllm/vllm-openai
    tag: latest
    pullPolicy: IfNotPresent

# ------------------------------------------------------------------------------
# Models
# Each entry deploys one KServe InferenceService.
#
# Common fields:
#   name             — DNS-safe name for the InferenceService
#   enabled          — false skips without removing from values
#   runtime          — vllm | huggingface | triton | kserve-custom
#   huggingFaceRepo  — HuggingFace model repo (org/model). Required for
#                      managed runtimes. For kserve-custom with
#                      externalModelCache: true, used by init container.
#   env              — environment variables injected into the container (map)
#   gpu              — number of GPUs (0 for CPU-only)
#   resources        — requests/limits for CPU and memory
#   scaling          — minReplicas / maxReplicas / timeoutSeconds
#   nodeSelector     — Kubernetes node selector labels
#   tolerations      — Kubernetes tolerations
#   modelCache       — per-model overrides: pvcName, serviceAccountName,
#                      skipManifestVerification
#   modelDownload    — per-model override for download init container image/resources
#
# kserve-custom additional fields:
#   customImage:
#     registry       — Docker registry    (default: docker.io)
#     repository     — org/image-name     (required)
#     tag            — image tag          (default: latest)
#     pullPolicy     — image pull policy  (default: IfNotPresent)
#
#   NOTE: For kserve-custom, MODEL_NAME, MODEL_BASE_PATH, and MODEL_SUBDIR
#   are injected automatically from name, modelCache.mountPath, and
#   huggingFaceRepo respectively. LOG_LEVEL and LOG_FORMAT are conventional
#   env keys read by model.py via os.environ.
#
# Actual model entries belong in release-specific override files, e.g.:
#   helm upgrade --install timeseries-serving ./kserve-model-serving \
#     -f releases/timeseries-serving/values.yaml
# ------------------------------------------------------------------------------
models: []
