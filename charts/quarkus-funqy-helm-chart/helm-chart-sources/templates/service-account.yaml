{{- if .Values.serviceAccount.create }}
# ---------------------------------------------------------------------------
# ServiceAccount for Funqy function pods.
# create: true  — chart creates the SA using name and annotations.
# create: false — use a pre-existing SA. name must still be set so
#                 Knative Service spec references the correct SA.
#
# Cloud-agnostic base — no GCP-specific annotations here.
# Workload Identity annotation applied via GCP-specific patch overlay:
#   iam.gke.io/gcp-service-account: <gsa>@<project>.iam.gserviceaccount.com
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "funqy-service.labels" . | nindent 4 }}
    {{- with .Values.serviceAccount.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- with .Values.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}