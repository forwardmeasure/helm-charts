apiVersion: v2
name: quarks-funqy-service
description: |
  Generic Knative Funqy serverless function chart.
  Deploys one or more Quarkus Funqy functions per release, each independently
  configurable with its own image, resources, secrets, scaling policy, and
  CloudEvent trigger bindings.

  Supports both JVM fast-jar and GraalVM native runtime modes — controlled
  per function via the image tag or digest. Native builds produce images of
  approximately 60-80MB with sub-millisecond cold start. JVM builds are used
  during development for faster iteration.

  Each function entry produces:
  - A Knative Service (serving.knative.dev/v1) with KPA scale-to-zero
  - One Knative Trigger per entry in the function's triggers list
  - ExternalSecrets for injected credentials via External Secrets Operator

  Designed to be deployed once per function family with function-specific
  configuration per entry in the functions list. Follows the same overlay
  pattern as the quarkus-service chart — overlays supply image, secrets,
  scaling, and environment configuration.

  Does not include:
  - Cloud SQL Auth Proxy — functions connect to PostgreSQL via an existing
    proxy or not at all
  - Liquibase wait init container — functions do not own schema migrations
  - Liveness and readiness probes — Knative manages pod lifecycle for
    scale-to-zero functions; standard HTTP probes interfere with KPA scaling
  - Kafka topic provisioning — functions consume CloudEvents via the Knative
    Broker, not directly from Kafka

type: application
version: "0.1.1"
appVersion: "1.0.0"
keywords:
  - quarkus
  - funqy
  - knative
  - serverless
  - cloudevents
  - screening
  - entity-resolution
