apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "opensearch.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - {{ .Values.opensearch.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.opensearch.pathPrefix | default "/api" | quote }}
      backendRefs:
        - name: {{ include "opensearch.fullname" . }}
          port: {{ .Values.service.ports.http }}
