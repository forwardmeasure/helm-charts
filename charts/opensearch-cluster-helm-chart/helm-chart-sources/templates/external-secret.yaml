{{/*
ExternalSecret – materialises the OpenSearch admin credentials from the
ClusterSecretStore into a Kubernetes Secret in the release namespace.

How it works:
  1. ESO reads the ExternalSecret CR
  2. It connects to the ClusterSecretStore
  3. The store returns the values for the configured remote keys
  4. ESO creates/updates a K8s Secret with those values
  5. The OpenSearchCluster CR references that Secret via
     spec.security.config.adminCredentialsSecret

IMPORTANT: externalSecret.adminCredentials.targetSecretName MUST match
security.adminCredentialsSecret — both reference the same K8s Secret.
helm install will fail with a clear error if they differ.

Note: ESO v0.17+ uses apiVersion: external-secrets.io/v1 (not v1beta1).
*/}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "opensearch-wrapper.externalSecretName" . }}
  namespace: {{ include "opensearch-wrapper.namespace" . }}
  labels:
    {{- include "opensearch-wrapper.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.externalSecret.targetSecretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ .Values.externalSecret.keys.username.property }}
      remoteRef:
        key: {{ .Values.externalSecret.keys.username.remoteKey }}
    - secretKey: {{ .Values.externalSecret.keys.password.property }}
      remoteRef:
        key: {{ .Values.externalSecret.keys.password.remoteKey }}
    - secretKey: {{ .Values.externalSecret.keys.cookie.property }}
      remoteRef:
        key: {{ .Values.externalSecret.keys.cookie.remoteKey }}        