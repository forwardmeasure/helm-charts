apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opensearch.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "opensearch.name" . }}
    app.kubernetes.io/component: search
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "opensearch.name" . }}
      app.kubernetes.io/component: search
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "opensearch.name" . }}
        app.kubernetes.io/component: search
    spec:
      initContainers:
        - name: fix-perf-analyzer-perms
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "[Init] Creating Performance Analyzer config files..."
              mkdir -p /usr/share/opensearch/data /usr/share/opensearch/config
              for f in performance_analyzer_enabled.conf \
                       rca_enabled.conf \
                       logging_enabled.conf \
                       batch_metrics_enabled.conf \
                       thread_contention_monitoring_enabled.conf; do
                touch "/usr/share/opensearch/data/$f"
              done
              chmod 0644 /usr/share/opensearch/data/*.conf
              chown -R 1000:1000 /usr/share/opensearch/data /usr/share/opensearch/config
          volumeMounts:
            - name: storage
              mountPath: /usr/share/opensearch/data
            - name: writable-config
              mountPath: /usr/share/opensearch/config

      containers:
        - name: opensearch
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.ports.http }}
              name: http
            - containerPort: {{ .Values.service.ports.transport }}
              name: transport
            - containerPort: {{ .Values.service.ports.metrics }}
              name: metrics
          env:
            - name: discovery.type
              value: "single-node"
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminSecret.name }}
                  key: {{ .Values.adminSecret.key }}
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms{{ .Values.jvm.heap.min }} -Xmx{{ .Values.jvm.heap.max }} {{ .Values.jvm.options }}"

          livenessProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: storage
              mountPath: /usr/share/opensearch/data
            - name: writable-config
              mountPath: /usr/share/opensearch/config
            - name: custom-config
              mountPath: /usr/share/opensearch/config/opensearch.yml
              subPath: opensearch.yml
            {{- if .Values.certificates.enabled }}
            - name: certs
              mountPath: {{ .Values.certificates.node.mountPath }}
              readOnly: true
            {{- end }}

      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: {{ include "opensearch.fullname" . }}-pvc
        - name: writable-config
          emptyDir: {}
        - name: custom-config
          configMap:
            name: opensearch-custom-config
        {{- if .Values.certificates.enabled }}
        - name: certs
          secret:
            secretName: {{ .Values.certificates.node.secretName }}
        {{- end }}
