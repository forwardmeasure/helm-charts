apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opensearch.fullname" . }}
  labels:
    app: {{ include "opensearch.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "opensearch.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "opensearch.name" . }}
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      initContainers:
        - name: patch-certs
          image: alpine:3.20
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "[Init] Preparing certs for OpenSearch TLS..."
              apk add --no-cache curl
              mkdir -p /patched-certs
              cat /certs/tls.crt > /patched-certs/tls.crt
              curl -sSL {{ .Values.certificates.r3Url }} >> /patched-certs/tls.crt
              cp /certs/tls.key /patched-certs/tls.key
              curl -sSL {{ .Values.certificates.r3Url }} -o /patched-certs/ca.crt
              chown 1000:1000 /patched-certs/*.crt /patched-certs/*.key
              chmod 600 /patched-certs/tls.key
              chmod 644 /patched-certs/tls.crt /patched-certs/ca.crt
          volumeMounts:
            - name: raw-certs
              mountPath: /certs
              readOnly: true
            - name: patched-certs
              mountPath: /patched-certs
          securityContext:
            runAsUser: 0

      containers:
        - name: opensearch
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.ports.http }}
              name: http
            - containerPort: {{ .Values.service.ports.transport }}
              name: transport
            - containerPort: {{ .Values.service.ports.metrics }}
              name: metrics
          env:
            - name: discovery.type
              value: "single-node"
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminSecret.name }}
                  key: {{ .Values.adminSecret.key }}
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
            - name: patched-certs
              mountPath: /usr/share/opensearch/config/certs
              readOnly: true
          resources:
{{ toYaml .Values.resources | indent 12 }}

      volumes:
        - name: data
          emptyDir: {}
        - name: raw-certs
          secret:
            secretName: {{ .Values.certificates.node.secretName }}
        - name: patched-certs
          emptyDir: {}
