apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opensearch.dashboards.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "opensearch.dashboards.name" . }}
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
spec:
  replicas: {{ .Values.dashboards.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "opensearch.dashboards.name" . }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "opensearch.dashboards.name" . }}
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboards
          image: {{ .Values.dashboards.image.repository }}:{{ .Values.dashboards.image.tag }}
          imagePullPolicy: {{ .Values.dashboards.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 5601
              name: http
          env:
            - name: OPENSEARCH_HOSTS
              value: {{ .Values.dashboards.opensearchHosts | quote }}
          resources:
            {{- toYaml .Values.dashboards.resources | nindent 12 }}
