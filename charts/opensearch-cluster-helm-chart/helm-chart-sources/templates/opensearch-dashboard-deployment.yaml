apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opensearch.fullname" . }}-dashboards
  labels:
    app.kubernetes.io/name: {{ include "opensearch.name" . }}
    app.kubernetes.io/component: dashboards
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
spec:
  replicas: {{ .Values.dashboards.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "opensearch.name" . }}
      app.kubernetes.io/component: dashboards
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "opensearch.name" . }}
        app.kubernetes.io/component: dashboards
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: dashboards
          image: {{ .Values.dashboards.image.repository }}:{{ .Values.dashboards.image.tag }}
          imagePullPolicy: {{ .Values.dashboards.image.pullPolicy }}
          ports:
            - containerPort: 5601
              name: http
          env:
            - name: OPENSEARCH_HOSTS
              value: {{ .Values.dashboards.opensearchHosts | quote }}
            - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
              value: {{ .Values.dashboards.disableSecurityPlugin | quote }}
