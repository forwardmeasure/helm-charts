apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "opensearch.fullname" . }}-dashboards
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - {{ .Values.dashboards.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.dashboards.pathPrefix | default "/" | quote }}
      backendRefs:
        - name: {{ include "opensearch.fullname" . }}-dashboards
          port: {{ .Values.dashboards.service.port }}
