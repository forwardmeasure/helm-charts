apiVersion: v2
name: opensearch-cluster
description: |
  Wrapper chart for the opensearch-project/opensearch and
  opensearch-project/opensearch-dashboards Helm charts.
  Adds cert-manager Certificate CRs, External Secrets Operator integration,
  Istio PeerAuthentication, and OpenSearch security plugin configuration.
type: application
version: "0.1.1"
# appVersion tracks the OpenSearch release. Both subchart dependency versions
# below must be kept in sync with this value.
appVersion: "3.5.0"

dependencies:
  - name: opensearch
    version: "3.5.0"
    repository: https://opensearch-project.github.io/helm-charts/
  - name: opensearch-dashboards
    version: "3.5.0"
    repository: https://opensearch-project.github.io/helm-charts/
