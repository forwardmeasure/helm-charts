replicaCount: 1

clusterName: "opensearch-cluster"
nodeName: "opensearch-node-1"

# Toggle OpenSearch security and TLS features
security:
  disable: true

  http:
    tls:
      enabled: false # TLS on HTTP disabled

image:
  repository: opensearchproject/opensearch
  tag: "3.1.0"
  pullPolicy: Always

adminSecret:
  name: opensearch-initial-admin-secret
  key: OPENSEARCH_INITIAL_ADMIN_PASSWORD
  value: "ChangeMe123!"

service:
  type: ClusterIP
  ports:
    http: 9200
    transport: 9300
    metrics: 9600

persistence:
  accessMode: ReadWriteOnce
  size: 30Gi
  storageClass: standard

resources:
  limits:
    cpu: "2"
    memory: "4Gi"
  requests:
    cpu: "500m"
    memory: "2Gi"

jvm:
  heap:
    min: "2g"
    max: "2g"
  options: "-XX:+UseG1GC -XX:+AlwaysPreTouch -Dlog4j2.formatMsgNoLookups=true"

opensearch:
  host: explore.datafabric.asvinau.com
  pathPrefix: "/api"

dashboards:
  replicaCount: 1
  image:
    repository: opensearchproject/opensearch-dashboards
    tag: "3.1.0"
    pullPolicy: Always
  opensearchHosts: "http://opensearch-opensearch.opensearch-cluster.svc.cluster.local:9200"
  disableSecurityPlugin: true
  service:
    type: ClusterIP
    port: 80
  host: explore.datafabric.asvinau.com
  pathPrefix: "/"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  ssl:
    verificationMode: none
  istio:
    disableMTLS: true
  podAnnotations:
    traffic.sidecar.istio.io/includeIPRanges: "*"

gateway:
  name: data-fabric-gateway
  namespace: istio-system

certificates:
  enabled: true
  r3Url: https://letsencrypt.org/certs/lets-encrypt-r3.pem

  issuer:
    name: letsencrypt-gcp-dns
    kind: ClusterIssuer

  node:
    secretName: opensearch-node-secret
    mountPath: /certs
    certFile: tls.crt
    keyFile: tls.key
    caFile: ca.crt

# Optional extra config passed to opensearch.yml
extraConfig:
  # Enable transport layer TLS (required for inter-node communication)
  "plugins.security.ssl.transport.enabled": "true"
  "plugins.security.ssl.transport.pemcert_filepath": "/usr/share/opensearch/config/certs/tls.crt"
  "plugins.security.ssl.transport.pemkey_filepath": "/usr/share/opensearch/config/certs/tls.key"
  "plugins.security.ssl.transport.pemtrustedcas_filepath": "/usr/share/opensearch/config/certs/ca.crt"
  "plugins.security.ssl.transport.enforce_hostname_verification": "false"

  # Enable security index bootstrapping
  "plugins.security.allow_default_init_securityindex": "true"
