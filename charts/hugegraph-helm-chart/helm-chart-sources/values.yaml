## ---------------------------------------------------------------------------
## Apache HugeGraph — Helm Chart Values
## ---------------------------------------------------------------------------

global:
  istio:
    enabled: true
    peerAuthentication:
      enabled: true
      mtlsMode: PERMISSIVE

## ---------------------------------------------------------------------------
## PD (Placement Driver) — 3-node Raft cluster
## ---------------------------------------------------------------------------
pd:
  replicaCount: 3

  image:
    repository: forwardmeasure/hugegraph-pd
    tag: "1.7.0"
    pullPolicy: Always

  initImage:
    repository: docker.io/eclipsefdn/kubectl
    tag: latest
    pullPolicy: Always

  peerDiscovery:
    pollSeconds: 2
    timeoutSeconds: 300

  istio:
    excludePorts:
      enabled: true
      inbound:
        - 8686
        - 8610
      outbound:
        - 8686
        - 8610

  ports:
    http: 8620
    grpc: 8686
    raft: 8610

  patrolInterval: 1800
  initialStoreCount: 3

  store:
    maxDownTime: 172800
    monitorDataEnabled: true
    monitorDataInterval: "1 minute"
    monitorDataRetention: "1 day"
    initialStoreCount: 1

  partition:
    defaultShardCount: 1
    storeMaxShardCount: 12

  persistence:
    storageClass: standard-rwo
    accessModes:
      - ReadWriteOnce
    size: 10Gi

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 2Gi

  javaOptions: "-Xms512m -Xmx1g -XX:+HeapDumpOnOutOfMemoryError"

  startupProbe:
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 20

  livenessProbe:
    periodSeconds: 30
    failureThreshold: 4

  readinessProbe:
    periodSeconds: 10
    failureThreshold: 6

  license:
    verifyPath: ./conf/verify-license.json
    licensePath: ./conf/hugegraph.license

## ---------------------------------------------------------------------------
## Store — placeholder for next step
## ---------------------------------------------------------------------------
store:
  replicaCount: 3

  image:
    repository: forwardmeasure/hugegraph-store
    tag: "1.7.0"
    pullPolicy: Always

  initImage:
    repository: docker.io/eclipsefdn/kubectl
    tag: latest
    pullPolicy: Always

  waitForPd:
    pollSeconds: 5
    timeoutSeconds: 300

  istio:
    excludePorts:
      enabled: true
      inbound:
        - 8500
        - 8510
      outbound:
        - 8500
        - 8510
        - 8686
        - 8610

  ports:
    grpc: 8500
    raft: 8510
    http: 8520

  raft:
    disruptorBufferSize: 1024
    maxLogFileSize: 600000000000
    snapshotInterval: 1800

  persistence:
    storageClass: standard-rwo
    accessModes:
      - ReadWriteOnce
    size: 32Gi

  resources:
    requests:
      cpu: 1
      memory: 2Gi
    limits:
      cpu: 4
      memory: 8Gi

  javaOptions: "-Xms512m -Xmx1g -XX:+HeapDumpOnOutOfMemoryError"

  startupProbe:
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 20

  livenessProbe:
    periodSeconds: 30
    failureThreshold: 4

  readinessProbe:
    periodSeconds: 10
    failureThreshold: 6

## ---------------------------------------------------------------------------
## Server — placeholder for next step
## ---------------------------------------------------------------------------
server:
  replicaCount: 1
  image:
    repository: forwardmeasure/hugegraph-server
    tag: "1.7.0"
    pullPolicy: Always

  initImage:
    repository: docker.io/eclipsefdn/kubectl
    tag: latest
    pullPolicy: IfNotPresent

  securityContext:
    runAsUser: 10013
    runAsGroup: 10013

  waitForDependencies:
    pollSeconds: 5
    timeoutSeconds: 300

  istio:
    excludePorts:
      enabled: true
      inbound:
        - 8181
        - 8091
      outbound:
        - 8686
        - 8610
        - 8500
        - 8510
        - 8091

  ports:
    http: 8080
    gremlin: 8181
    rpc: 8091

  role:
    master: master
    worker: worker

  task:
    schedulerType: distributed

  auth:
    enabled: false
    credentialsSecret: hugegraph-auth
    adminPassword: ""

  graph:
    backend: hstore
    serializer: binary
    store: hugegraph
    vertexCacheType: l2
    edgeCacheType: l2

  slowQueryThreshold: 1000

  resources:
    requests:
      cpu: 1
      memory: 2Gi
    limits:
      cpu: 4
      memory: 8Gi

  javaOptions: "-Xms512m -Xmx1g -XX:+HeapDumpOnOutOfMemoryError"

  startupProbe:
    initialDelaySeconds: 40
    periodSeconds: 15
    failureThreshold: 20

  readinessProbe:
    periodSeconds: 10
    failureThreshold: 6

  livenessProbe:
    periodSeconds: 30
    failureThreshold: 4

## ---------------------------------------------------------------------------
## Hubble — placeholder for next step
## ---------------------------------------------------------------------------
hubble:
  enabled: true
  replicaCount: 1
  image:
    repository: forwardmeasure/hugegraph-hubble
    tag: "1.7.0"
    pullPolicy: Always

  ports:
    http: 8088

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

  server:
    host: hugegraph-server-client.hugegraph.svc.cluster.local
    port: 8080

  gremlin:
    suffixLimit: 250
    vertexDegreeLimit: 100
    edgesTotalLimit: 500
    batchQueryIds: 100

  startupProbe:
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 6

  readinessProbe:
    periodSeconds: 10
    failureThreshold: 6

  livenessProbe:
    periodSeconds: 15
    failureThreshold: 4

## ---------------------------------------------------------------------------
## Common
## ---------------------------------------------------------------------------
imagePullSecrets:
  - name: docker-io-credentials

serviceAccount:
  name: hugegraph
