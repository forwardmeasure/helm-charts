## ---------------------------------------------------------------------------
## Apache HugeGraph — Helm Chart Values
## Derived from upstream docker/configs reference configuration
## ---------------------------------------------------------------------------

## ---------------------------------------------------------------------------
## PD (Placement Driver) — 3-node Raft cluster
## ---------------------------------------------------------------------------
pd:
  replicaCount: 3
  image:
    repository: docker.io/hugegraph/pd
    tag: latest
    pullPolicy: Always

  ports:
    http: 8620
    grpc: 8686
    raft: 8610

  patrolInterval: 1800
  initialStoreCount: 3

  store:
    maxDownTime: 172800
    monitorDataEnabled: true
    monitorDataInterval: "1 minute"
    monitorDataRetention: "1 day"
    initialStoreCount: 1

  partition:
    defaultShardCount: 1
    storeMaxShardCount: 12

  persistence:
    storageClass: standard-rwo
    size: 10Gi

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 2Gi
  javaOptions: "-Xms512m -Xmx1g -XX:+HeapDumpOnOutOfMemoryError"

  startupProbe:
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 20 # 30 + (20 * 15) = 330s max startup window
  livenessProbe:
    periodSeconds: 30
    failureThreshold: 4 # 120s to detect a hung pod once running
  readinessProbe:
    periodSeconds: 10
    failureThreshold: 6

  license:
    verifyPath: ./conf/verify-license.json
    licensePath: ./conf/hugegraph.license

## ---------------------------------------------------------------------------
## Store — 3-node Raft + RocksDB
## ---------------------------------------------------------------------------
store:
  replicaCount: 3
  image:
    repository: docker.io/hugegraph/store
    tag: latest
    pullPolicy: Always

  ports:
    grpc: 8500
    raft: 8510
    http: 8520

  raft:
    disruptorBufferSize: 1024
    maxLogFileSize: 600000000000
    snapshotInterval: 1800

  persistence:
    storageClass: standard-rwo
    size: 32Gi

  resources:
    requests:
      cpu: 1
      memory: 2Gi
    limits:
      cpu: 4
      memory: 8Gi
  javaOptions: "-Xms512m -Xmx1g -XX:+HeapDumpOnOutOfMemoryError"

  startupProbe:
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 20 # same window, store waits for PD first via init container
  livenessProbe:
    periodSeconds: 30
    failureThreshold: 4
  readinessProbe:
    periodSeconds: 10
    failureThreshold: 6

## ---------------------------------------------------------------------------
## Server — stateless REST/Gremlin/Cypher nodes
## ---------------------------------------------------------------------------
server:
  replicaCount: 3
  image:
    repository: docker.io/hugegraph/server
    tag: latest
    pullPolicy: Always

  ports:
    http: 8080 # restserver.url port
    gremlin: 8181 # gremlinserver.url port (same on all pods, differentiated by pod IP)
    rpc: 8091 # rpc.server_port base
    arthasHttp: 8561 # arthas.http_port base
    arthasTelnet: 8562 # arthas.telnet_port base

  auth:
    enabled: false
    ## When enabled, secret must contain key: HUGEGRAPH_ADMIN_PASSWORD
    ## Uncomment auth.authenticator in rest-server.properties template below
    credentialsSecret: hugegraph-auth
    adminPassword: ""

  graph:
    ## backend must be hstore for distributed PD/Store mode
    backend: hstore
    serializer: binary
    store: hugegraph
    vertexCacheType: l2
    edgeCacheType: l2

  task:
    schedulerType: local
    schedulePeriod: 10
    retry: 0
    waitTimeout: 10

  slowQueryThreshold: 1000

  resources:
    requests:
      cpu: 1
      memory: 2Gi
    limits:
      cpu: 4
      memory: 8Gi
  javaOptions: "-Xms512m -Xmx1g -XX:+HeapDumpOnOutOfMemoryError"

  startupProbe:
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 24 # slightly longer — waits for store init container too
  livenessProbe:
    periodSeconds: 30
    failureThreshold: 4
  readinessProbe:
    periodSeconds: 10
    failureThreshold: 6

## ---------------------------------------------------------------------------
## Hubble — web UI
## ---------------------------------------------------------------------------
hubble:
  enabled: true
  replicaCount: 1
  image:
    repository: docker.io/hugegraph/hubble
    tag: latest
    pullPolicy: Always

  ports:
    http: 8088

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

## ---------------------------------------------------------------------------
## Common
## ---------------------------------------------------------------------------
imagePullSecrets:
  - name: docker-io-credentials

serviceAccount:
  name: hugegraph
