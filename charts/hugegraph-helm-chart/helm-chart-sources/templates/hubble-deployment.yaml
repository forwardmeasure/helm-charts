{{- if .Values.hubble.enabled }}
## ---------------------------------------------------------------------------
## HugeGraph Hubble — graph visualization and management UI
## Points at hugegraph-server-client (load-balanced ClusterIP)
## Server connection and gremlin tuning configured via ConfigMap.
## ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hugegraph-hubble
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hugegraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: hubble
spec:
  replicas: {{ .Values.hubble.replicaCount }}
  selector:
    matchLabels:
      {{- include "hugegraph.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: hubble
  template:
    metadata:
      labels:
        {{- include "hugegraph.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: hubble
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: hubble
          image: "{{ .Values.hubble.image.repository }}:{{ .Values.hubble.image.tag }}"
          imagePullPolicy: {{ .Values.hubble.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.hubble.ports.http }}
          volumeMounts:
            - name: hubble-config
              mountPath: /hubble/conf/hugegraph-hubble.properties
              subPath: hugegraph-hubble.properties
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: {{ .Values.hubble.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.hubble.startupProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.hubble.startupProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: {{ .Values.hubble.readinessProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.hubble.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: {{ .Values.hubble.livenessProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.hubble.livenessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.hubble.resources | nindent 12 }}
      volumes:
        - name: hubble-config
          configMap:
            name: hugegraph-hubble-config
---
apiVersion: v1
kind: Service
metadata:
  name: hugegraph-hubble
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hugegraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: hubble
spec:
  selector:
    {{- include "hugegraph.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: hubble
  ports:
    - name: http
      port: {{ .Values.hubble.ports.http }}
      targetPort: http
{{- end }}