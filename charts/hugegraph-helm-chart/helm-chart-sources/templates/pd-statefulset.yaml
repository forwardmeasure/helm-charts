## ---------------------------------------------------------------------------
## HugeGraph PD — Placement Driver (3-node Raft cluster)
##
## Init container:
##   1. Gets own IP from Downward API (always available, no DNS needed)
##   2. For each peer: if the peer FQDN matches our own pod name, use SELF_IP
##      directly (avoids waiting on our own DNS which isn't resolvable from
##      within an init container). For all other peers, wait on nslookup.
##   3. Writes application.yml using resolved IPs for raft.address and
##      raft.peers-list — required because IpAuthHandler builds its allowed
##      set via PeerId::getIp which returns the raw peers-list string.
##      If peers-list contains hostnames, allowedIps holds hostnames but
##      getClientIp() returns numeric IPs → they never match → blocked.
##      Using IPs in peers-list fixes this permanently.
## ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hugegraph-pd
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hugegraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: pd
spec:
  serviceName: hugegraph-pd
  replicas: {{ .Values.pd.replicaCount }}
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "hugegraph.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pd
  template:
    metadata:
      annotations:
        traffic.sidecar.istio.io/excludeInboundPorts: "8686,8610"
        traffic.sidecar.istio.io/excludeOutboundPorts: "8686,8610"
      labels:
        {{- include "hugegraph.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pd
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      initContainers:
        - name: config-gen
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              NS="{{ .Release.Namespace }}"

              # Self IP from Downward API — always available immediately.
              # Pod DNS records don't exist until Running, so we cannot
              # nslookup our own FQDN from within an init container.
              SELF_IP="${POD_IP}"
              SELF_FQDN="${POD_NAME}.hugegraph-pd.${NS}.svc.cluster.local"
              echo "[config-gen] Self: ${SELF_FQDN} -> ${SELF_IP} (Downward API)"

              # Resolve a peer DNS name to its pod IP.
              # Busybox nslookup output:
              #   Server:    10.96.0.10
              #   Address 1: 10.96.0.10:53   <- DNS server, skip
              #   Address 1: 10.72.x.x name  <- pod IP we want
              resolve_ip() {
                nslookup "$1" 2>/dev/null \
                  | awk '/^Address / { print $NF }' \
                  | grep -v ':53$' \
                  | head -1
              }

              # For each peer: skip DNS if it's our own FQDN (use SELF_IP),
              # otherwise wait until nslookup returns a numeric IP.
              {{- range $i := until (.Values.pd.replicaCount | int) }}
              PEER_DNS_{{ $i }}="hugegraph-pd-{{ $i }}.hugegraph-pd.${NS}.svc.cluster.local"
              if [ "${PEER_DNS_{{ $i }}}" = "${SELF_FQDN}" ]; then
                PEER_IP_{{ $i }}="${SELF_IP}"
                echo "[config-gen] Self peer hugegraph-pd-{{ $i }} -> ${SELF_IP} (Downward API)"
              else
                while true; do
                  IP=$(resolve_ip "${PEER_DNS_{{ $i }}}")
                  if [ -n "$IP" ]; then
                    PEER_IP_{{ $i }}="$IP"
                    echo "[config-gen] Resolved ${PEER_DNS_{{ $i }}} -> $IP"
                    break
                  fi
                  echo "[config-gen] Waiting for ${PEER_DNS_{{ $i }}} to resolve..."
                  sleep 2
                done
              fi
              {{- end }}

              # Build comma-separated IP-based raft peers list
              RAFT_PEERS="{{ range $i := until (.Values.pd.replicaCount | int) }}${PEER_IP_{{ $i }}}:{{ $.Values.pd.ports.raft }}{{ if lt (add1 $i) ($.Values.pd.replicaCount | int) }},{{ end }}{{ end }}"

              # Store initial-store-list — DNS names are fine here,
              # store uses gRPC not sofa-bolt, no IpAuthHandler involved
              STORE_LIST="{{ include "hugegraph.storeGrpcList" . }}"

              mkdir -p /config
              cat > /config/application.yml << EOF
              spring:
                application:
                  name: hugegraph-pd

              management:
                metrics:
                  export:
                    prometheus:
                      enabled: true
                endpoints:
                  web:
                    exposure:
                      include: "*"

              logging:
                config: 'file:./conf/log4j2.xml'

              license:
                verify-path: {{ .Values.pd.license.verifyPath }}
                license-path: {{ .Values.pd.license.licensePath }}

              grpc:
                port: {{ .Values.pd.ports.grpc | int }}
                host: 0.0.0.0

              server:
                port: {{ .Values.pd.ports.http | int }}

              pd:
                data-path: /data/pd_data
                patrol-interval: {{ .Values.pd.patrolInterval | int64 }}
                initial-store-count: {{ .Values.pd.initialStoreCount | int }}
                initial-store-list: ${STORE_LIST}

              raft:
                address: ${SELF_IP}:{{ .Values.pd.ports.raft }}
                peers-list: ${RAFT_PEERS}

              store:
                max-down-time: {{ .Values.pd.store.maxDownTime }}
                monitor_data_enabled: {{ .Values.pd.store.monitorDataEnabled }}
                monitor_data_interval: {{ .Values.pd.store.monitorDataInterval }}
                monitor_data_retention: {{ .Values.pd.store.monitorDataRetention }}
                initial-store-count: {{ .Values.pd.store.initialStoreCount }}

              partition:
                default-shard-count: {{ .Values.pd.partition.defaultShardCount | int }}
                store-max-shard-count: {{ .Values.pd.partition.storeMaxShardCount | int }}
              EOF
              echo "[config-gen] Generated application.yml for ${POD_NAME} (raft.address=${SELF_IP}:{{ .Values.pd.ports.raft }}, peers=${RAFT_PEERS})"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: config
              mountPath: /config

      containers:
        - name: pd
          image: "{{ .Values.pd.image.repository }}:{{ .Values.pd.image.tag }}"
          imagePullPolicy: {{ .Values.pd.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.pd.ports.http | int }}
            - name: grpc
              containerPort: {{ .Values.pd.ports.grpc | int }}
            - name: raft
              containerPort: {{ .Values.pd.ports.raft | int }}
          env:
            - name: JAVA_OPTIONS
              value: {{ .Values.pd.javaOptions | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: config
              mountPath: /hugegraph-pd/conf/application.yml
              subPath: application.yml
            - name: data
              mountPath: /data
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: {{ .Values.pd.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.pd.startupProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.pd.startupProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: {{ .Values.pd.readinessProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.pd.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: {{ .Values.pd.livenessProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.pd.livenessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.pd.resources | nindent 12 }}

      volumes:
        - name: config
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.pd.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.pd.persistence.size }}
