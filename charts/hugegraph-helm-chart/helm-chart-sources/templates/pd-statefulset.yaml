apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hugegraph-pd
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hugegraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: pd
spec:
  serviceName: hugegraph-pd
  replicas: {{ .Values.pd.replicaCount }}
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "hugegraph.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pd
  template:
    metadata:
      {{- if and .Values.global.istio.enabled .Values.pd.istio.excludePorts.enabled }}
      annotations:
        traffic.sidecar.istio.io/excludeInboundPorts: "{{ join "," .Values.pd.istio.excludePorts.inbound }}"
        traffic.sidecar.istio.io/excludeOutboundPorts: "{{ join "," .Values.pd.istio.excludePorts.outbound }}"
      {{- end }}
      labels:
        {{- include "hugegraph.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pd
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mkdir -p /data/pd_data
              chown -R 10013:10013 /data
              chmod -R u+rwX,g+rwX /data
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: data
              mountPath: /data

        - name: config-gen
          image: "{{ .Values.pd.initImage.repository }}:{{ .Values.pd.initImage.tag }}"
          imagePullPolicy: {{ .Values.pd.initImage.pullPolicy }}
          command:
            - /bin/sh
            - /scripts/config-gen.sh
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PD_REPLICA_COUNT
              value: {{ .Values.pd.replicaCount | quote }}
            - name: PD_RAFT_PORT
              value: {{ .Values.pd.ports.raft | quote }}
            - name: PD_POLL_SECONDS
              value: {{ .Values.pd.peerDiscovery.pollSeconds | quote }}
            - name: PD_TIMEOUT_SECONDS
              value: {{ .Values.pd.peerDiscovery.timeoutSeconds | quote }}
            - name: STORE_GRPC_LIST
              value: "{{ include "hugegraph.storeGrpcList" . }}"
          volumeMounts:
            - name: pd-config
              mountPath: /templates/application.yaml.tpl
              subPath: application.yaml.tpl
            - name: pd-config
              mountPath: /scripts/config-gen.sh
              subPath: config-gen.sh
            - name: generated-config
              mountPath: /config

      containers:
        - name: pd
          image: "{{ .Values.pd.image.repository }}:{{ .Values.pd.image.tag }}"
          imagePullPolicy: {{ .Values.pd.image.pullPolicy }}
          securityContext:
            runAsUser: 10013
            runAsGroup: 10013
          ports:
            - name: http
              containerPort: {{ .Values.pd.ports.http }}
            - name: grpc
              containerPort: {{ .Values.pd.ports.grpc }}
            - name: raft
              containerPort: {{ .Values.pd.ports.raft }}
          env:
            - name: JAVA_OPTIONS
              value: {{ .Values.pd.javaOptions | quote }}
          volumeMounts:
            - name: generated-config
              mountPath: /opt/hugegraph-pd/conf/application.yaml
              subPath: application.yaml
            - name: pd-config
              mountPath: /opt/hugegraph-pd/conf/log4j2.xml
              subPath: log4j2.xml
            - name: data
              mountPath: /data
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: {{ .Values.pd.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.pd.startupProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.pd.startupProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: {{ .Values.pd.readinessProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.pd.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: {{ .Values.pd.livenessProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.pd.livenessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.pd.resources | nindent 12 }}

      volumes:
        - name: pd-config
          configMap:
            name: hugegraph-pd-config
            defaultMode: 0755
        - name: generated-config
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.pd.persistence.accessModes | nindent 10 }}
        storageClassName: {{ .Values.pd.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.pd.persistence.size }}