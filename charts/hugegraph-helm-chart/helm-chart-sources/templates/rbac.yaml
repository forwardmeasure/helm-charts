## ---------------------------------------------------------------------------
## RBAC — allows the hugegraph ServiceAccount to read pod IPs.
## Required by the PD init container which uses kubectl to resolve peer pod
## IPs before DNS is available (StatefulSet headless DNS only works once
## pods are Ready, but pods are still in init containers at that point).
## ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "hugegraph.fullname" . }}-pod-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hugegraph.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "hugegraph.fullname" . }}-pod-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hugegraph.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "hugegraph.fullname" . }}-pod-reader
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}