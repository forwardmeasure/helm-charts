apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hugegraph-store
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hugegraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: store
spec:
  serviceName: hugegraph-store
  replicas: {{ .Values.store.replicaCount }}
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "hugegraph.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: store
  template:
    metadata:
      {{- if and .Values.global.istio.enabled .Values.store.istio.excludePorts.enabled }}
      annotations:
        traffic.sidecar.istio.io/excludeInboundPorts: "{{ join "," .Values.store.istio.excludePorts.inbound }}"
        traffic.sidecar.istio.io/excludeOutboundPorts: "{{ join "," .Values.store.istio.excludePorts.outbound }}"
      {{- end }}
      labels:
        {{- include "hugegraph.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: store
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        fsGroup: 10013
        fsGroupChangePolicy: OnRootMismatch
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mkdir -p /data/storage
              chown -R 10013:10013 /data
              chmod -R u+rwX,g+rwX /data
          securityContext:
            runAsUser: 0
            runAsGroup: 0            
          volumeMounts:
            - name: data
              mountPath: /data
            
        - name: config-gen
          image: "{{ .Values.store.initImage.repository }}:{{ .Values.store.initImage.tag }}"
          imagePullPolicy: {{ .Values.store.initImage.pullPolicy }}
          command:
            - /bin/sh
          args:
            - /scripts/config-gen.sh
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: STORE_RAFT_PORT
              value: {{ .Values.store.ports.raft | quote }}
            - name: PD_HTTP_PORT
              value: {{ .Values.pd.ports.http | quote }}
            - name: PD_REPLICA_COUNT
              value: {{ .Values.pd.replicaCount | quote }}
            - name: WAIT_POLL_SECONDS
              value: {{ .Values.store.waitForPd.pollSeconds | quote }}
            - name: WAIT_TIMEOUT_SECONDS
              value: {{ .Values.store.waitForPd.timeoutSeconds | quote }}
            - name: PD_ADDRS
              value: "{{ include "hugegraph.pdGrpcPeers" . }}"
          volumeMounts:
            - name: store-config
              mountPath: /templates/application.yaml.tpl
              subPath: application.yaml.tpl
            - name: store-config
              mountPath: /scripts/config-gen.sh
              subPath: config-gen.sh
            - name: generated-config
              mountPath: /config

      containers:
        - name: store
          image: "{{ .Values.store.image.repository }}:{{ .Values.store.image.tag }}"
          imagePullPolicy: {{ .Values.store.image.pullPolicy }}
          securityContext:
            runAsUser: 10013
            runAsGroup: 10013
            allowPrivilegeEscalation: false
          ports:
            - name: grpc
              containerPort: {{ .Values.store.ports.grpc }}
            - name: raft
              containerPort: {{ .Values.store.ports.raft }}
            - name: http
              containerPort: {{ .Values.store.ports.http }}
          env:
            - name: JAVA_OPTIONS
              value: {{ .Values.store.javaOptions | quote }}
          volumeMounts:
            - name: generated-config
              mountPath: /opt/hugegraph-store/conf/application.yaml
              subPath: application.yaml
            - name: store-config
              mountPath: /opt/hugegraph-store/conf/log4j2.xml
              subPath: log4j2.xml
            - name: data
              mountPath: /data
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.store.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.store.startupProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.store.startupProbe.failureThreshold }}
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: {{ .Values.store.readinessProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.store.readinessProbe.failureThreshold }}
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: {{ .Values.store.livenessProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.store.livenessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.store.resources | nindent 12 }}

      volumes:
        - name: store-config
          configMap:
            name: hugegraph-store-config
            defaultMode: 0755
        - name: generated-config
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.store.persistence.accessModes | nindent 10 }}
        storageClassName: {{ .Values.store.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.store.persistence.size }}