apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hugegraph-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hugegraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  serviceName: hugegraph-server
  replicas: {{ .Values.server.replicaCount }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "hugegraph.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      {{- if and .Values.global.istio.enabled .Values.server.istio.excludePorts.enabled }}
      annotations:
        traffic.sidecar.istio.io/excludeInboundPorts: "{{ join "," .Values.server.istio.excludePorts.inbound }}"
        traffic.sidecar.istio.io/excludeOutboundPorts: "{{ join "," .Values.server.istio.excludePorts.outbound }}"
      {{- end }}
      labels:
        {{- include "hugegraph.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      initContainers:
        - name: config-gen
          image: "{{ .Values.server.initImage.repository }}:{{ .Values.server.initImage.tag }}"
          imagePullPolicy: {{ .Values.server.initImage.pullPolicy }}
          command:
            - /bin/sh
          args:
            - /scripts/config-gen.sh
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

            - name: HTTP_PORT
              value: {{ .Values.server.ports.http | quote }}
            - name: GREMLIN_PORT
              value: {{ .Values.server.ports.gremlin | quote }}
            - name: RPC_PORT
              value: {{ .Values.server.ports.rpc | quote }}

            - name: PD_HTTP_PORT
              value: {{ .Values.pd.ports.http | quote }}
            - name: PD_REPLICA_COUNT
              value: {{ .Values.pd.replicaCount | quote }}

            - name: STORE_HTTP_PORT
              value: {{ .Values.store.ports.http | quote }}
            - name: STORE_REPLICA_COUNT
              value: {{ .Values.store.replicaCount | quote }}

            - name: WAIT_POLL_SECONDS
              value: {{ .Values.server.waitForDependencies.pollSeconds | quote }}
            - name: WAIT_TIMEOUT_SECONDS
              value: {{ .Values.server.waitForDependencies.timeoutSeconds | quote }}

            - name: PD_ADDRS
              value: "{{ include "hugegraph.pdGrpcPeers" . }}"

            - name: SERVER_ROLE_MASTER
              value: {{ .Values.server.role.master | quote }}
            - name: SERVER_ROLE_WORKER
              value: {{ .Values.server.role.worker | quote }}
            - name: TASK_SCHEDULER_TYPE
              value: {{ .Values.server.task.schedulerType | quote }}

            - name: GRAPH_BACKEND
              value: {{ .Values.server.graph.backend | quote }}
            - name: GRAPH_SERIALIZER
              value: {{ .Values.server.graph.serializer | quote }}
            - name: GRAPH_STORE
              value: {{ .Values.server.graph.store | quote }}
            - name: VERTEX_CACHE_TYPE
              value: {{ .Values.server.graph.vertexCacheType | quote }}
            - name: EDGE_CACHE_TYPE
              value: {{ .Values.server.graph.edgeCacheType | quote }}
            - name: AUTH_ENABLED
              value: {{ ternary "true" "false" .Values.server.auth.enabled | quote }}
            - name: SLOW_QUERY_THRESHOLD
              value: {{ .Values.server.slowQueryThreshold | quote }}

          volumeMounts:
            - name: server-config
              mountPath: /templates/gremlin-server.yaml.tpl
              subPath: gremlin-server.yaml.tpl
            - name: server-config
              mountPath: /templates/rest-server.properties.tpl
              subPath: rest-server.properties.tpl
            - name: server-config
              mountPath: /templates/hugegraph.properties.tpl
              subPath: hugegraph.properties.tpl
            - name: server-config
              mountPath: /scripts/config-gen.sh
              subPath: config-gen.sh
            - name: generated-config
              mountPath: /config

      containers:
        - name: server
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          securityContext:
            runAsUser: {{ .Values.server.securityContext.runAsUser }}
            runAsGroup: {{ .Values.server.securityContext.runAsGroup }}
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: {{ .Values.server.ports.http }}
            - name: gremlin
              containerPort: {{ .Values.server.ports.gremlin }}
            - name: rpc
              containerPort: {{ .Values.server.ports.rpc }}
          env:
            - name: JAVA_OPTIONS
              value: {{ .Values.server.javaOptions | quote }}
          volumeMounts:
            - name: generated-config
              mountPath: /opt/hugegraph/conf/rest-server.properties
              subPath: rest-server.properties
            - name: generated-config
              mountPath: /opt/hugegraph/conf/gremlin-server.yaml
              subPath: gremlin-server.yaml
            - name: generated-config
              mountPath: /opt/hugegraph/conf/graphs
              subPath: graphs
            - name: server-config
              mountPath: /opt/hugegraph/conf/log4j2.xml
              subPath: log4j2.xml
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.server.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.server.startupProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.server.startupProbe.failureThreshold }}
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: {{ .Values.server.readinessProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.server.readinessProbe.failureThreshold }}
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: {{ .Values.server.livenessProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.server.livenessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}

      volumes:
        - name: server-config
          configMap:
            name: hugegraph-server-config
            defaultMode: 0755
        - name: generated-config
          emptyDir: {}