apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ include "itineris.fullname" . }}-k8ssandra-store
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "itineris.labels" . | nindent 4 }}
spec:
  provider:
    kubernetes:
      remoteNamespace: {{ .Values.cql.credentialsSecret.namespace }}
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: {{ .Release.Namespace }}
          key: ca.crt
      auth:
        serviceAccount:
          name: {{ include "itineris.serviceAccountName" . }}
          namespace: {{ .Release.Namespace }}