apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "itineris.fullname" . }}-secret-reader
  namespace: {{ .Values.cql.credentialsSecret.namespace }}
  labels:
    {{- include "itineris.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ .Values.cql.credentialsSecret.name }}
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "itineris.fullname" . }}-secret-reader
  namespace: {{ .Values.cql.credentialsSecret.namespace }}
  labels:
    {{- include "itineris.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "itineris.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: {{ include "itineris.fullname" . }}-secret-reader