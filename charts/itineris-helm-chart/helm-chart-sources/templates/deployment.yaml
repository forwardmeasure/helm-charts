apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "itineris.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "itineris.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "itineris.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "itineris.labels" . | nindent 8 }}
      annotations:
        {{- if .Values.opensearch.enabled }}
        traffic.sidecar.istio.io/excludeOutboundPorts: {{ .Values.opensearch.port | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "itineris.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: itineris
          image: {{ include "itineris.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: gremlin
              containerPort: 8182
              protocol: TCP
          env:
            # ----------------------------------------------------------------
            # Server bootstrap
            # ----------------------------------------------------------------
            - name: ITINERIS_PROPS_TEMPLATE
              value: {{ .Values.itineris.propsTemplate | quote }}
            - name: ITINERIS_STORAGE_TIMEOUT
              value: {{ .Values.itineris.storageTimeout | quote }}
            - name: ITINERIS_SERVER_TIMEOUT
              value: {{ .Values.itineris.serverTimeout | quote }}
            - name: JAVA_OPTIONS
              value: {{ .Values.itineris.javaOptions | quote }}

            # ----------------------------------------------------------------
            # Gremlin server tuning
            # ----------------------------------------------------------------
            - name: gremlinserver.threadPoolWorker
              value: {{ .Values.itineris.gremlinThreadPoolWorker | quote }}
            - name: gremlinserver.gremlinPool
              value: {{ .Values.itineris.gremlinPool | quote }}

            # ----------------------------------------------------------------
            # CQL storage backend
            # ----------------------------------------------------------------
            - name: itineris.storage.hostname
              value: {{ .Values.cql.hostname | quote }}
            - name: itineris.storage.port
              value: {{ .Values.cql.port | quote }}
            - name: itineris.storage.cql.keyspace
              value: {{ .Values.cql.keyspace | quote }}
            - name: itineris.storage.cql.local-datacenter
              value: {{ .Values.cql.localDatacenter | quote }}
            - name: itineris.storage.cql.replication-factor
              value: {{ .Values.cql.replicationFactor | quote }}
            {{- if .Values.cql.initWaitTime }}
            - name: itineris.storage.cql.init-wait-time
              value: {{ .Values.cql.initWaitTime | quote }}
            {{- end }}
            # CQL credentials sourced from ExternalSecret itineris-cql-credentials
            - name: itineris.storage.username
              valueFrom:
                secretKeyRef:
                  name: itineris-cql-credentials
                  key: username
            - name: itineris.storage.password
              valueFrom:
                secretKeyRef:
                  name: itineris-cql-credentials
                  key: password

            # ----------------------------------------------------------------
            # OpenSearch index backend
            # ----------------------------------------------------------------
            {{- if .Values.opensearch.enabled }}
            - name: itineris.index.search.backend
              value: "opensearch"
            - name: itineris.index.search.hostname
              value: {{ .Values.opensearch.hostname | quote }}
            - name: itineris.index.search.port
              value: {{ .Values.opensearch.port | quote }}

            # HTTP Basic auth — type must be "basic" for credentials to be sent
            - name: itineris.index.search.opensearch.http.auth.type
              value: "basic"
            - name: itineris.index.search.opensearch.http.auth.basic.username
              valueFrom:
                secretKeyRef:
                  name: itineris-opensearch-credentials
                  key: username
            - name: itineris.index.search.opensearch.http.auth.basic.password
              valueFrom:
                secretKeyRef:
                  name: itineris-opensearch-credentials
                  key: password

            # SSL — OpenSearch requires HTTPS; allow self-signed certs
            - name: itineris.index.search.opensearch.ssl.enabled
              value: {{ .Values.opensearch.ssl.enabled | quote }}
            - name: itineris.index.search.opensearch.ssl.disable-hostname-verification
              value: {{ .Values.opensearch.ssl.disableHostnameVerification | quote }}
            - name: itineris.index.search.opensearch.ssl.allow-self-signed-certificates
              value: {{ .Values.opensearch.ssl.allowSelfSignedCertificates | quote }}
            {{- end }}

            # ----------------------------------------------------------------
            # Extra env vars (from values)
            # ----------------------------------------------------------------
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          livenessProbe:
            tcpSocket:
              port: 8182
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            tcpSocket:
              port: 8182
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.persistence.enabled .Values.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /opt/itineris/data
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or .Values.persistence.enabled .Values.extraVolumes }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "itineris.fullname" . }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}