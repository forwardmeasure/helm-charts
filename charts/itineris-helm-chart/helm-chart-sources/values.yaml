# -- Number of Itineris server replicas
replicaCount: 1

image:
  # -- Image registry
  registry: docker.io
  # -- Image repository
  repository: forwardmeasure/itineris
  # -- Image tag (ignored if digest is set)
  tag: "1.1.0"
  # -- Image digest (takes precedence over tag if set)
  # e.g. sha256:abc123...
  digest: ""
  # -- Image pull policy
  pullPolicy: Always

# -- Image pull secrets
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the full resource name
fullnameOverride: ""

serviceAccount:
  # -- Create a service account
  create: true
  # -- Annotations for the service account
  annotations: {}
  # -- Service account name override
  name: ""

# -- Annotations for the pod
podAnnotations: {}

# -- Security context for the pod
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10013
  runAsGroup: 10013
  fsGroup: 10013

# -- Security context for the container
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  # -- Service type
  type: ClusterIP
  # -- Gremlin WebSocket/HTTP port
  port: 8182

# -- Resource requests and limits
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Probe timing configuration
# Handler type (tcpSocket on port 8182) is fixed in the deployment template
# to avoid Helm deep-merge conflicts when overriding individual timing values.
probes:
  liveness:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# -- Itineris server configuration
itineris:
  # -- Properties template to use (inmemory-server, cql-server, cql-opensearch-server)
  propsTemplate: cql-opensearch-server
  # -- Storage backend timeout in seconds
  storageTimeout: 120
  # -- Server startup timeout in seconds
  serverTimeout: 60
  # -- Java options
  javaOptions: "-Xmx1g"
  # -- Gremlin thread pool worker count
  gremlinThreadPoolWorker: 1
  # -- Gremlin pool size
  gremlinPool: 8

# -- CQL (Cassandra/k8ssandra) backend configuration
cql:
  # -- Cassandra hostname or service name
  hostname: ""
  # -- Cassandra port
  port: 9042
  # -- Cassandra keyspace
  keyspace: itineris
  # -- Cassandra local datacenter
  localDatacenter: dc1
  # -- Replication factor
  replicationFactor: 3
  # -- k8ssandra superuser secret — read directly from k8ssandra namespace via SecretStore
  credentialsSecret:
    name: data-fabric-superuser
    namespace: k8ssandra-cluster

# -- OpenSearch index backend configuration
opensearch:
  # -- Enable OpenSearch index backend
  enabled: true
  # -- OpenSearch hostname or service name
  hostname: ""
  # -- OpenSearch port
  port: 9200
  # -- OpenSearch credentials secret (synced by platform-secrets)
  ssl:
    enabled: true
    disableHostnameVerification: true
    allowSelfSignedCertificates: true

# -- External Secrets Operator configuration
externalSecrets:
  refreshInterval: 1h

# -- Persistence configuration
persistence:
  # -- Enable persistent volume
  enabled: false
  # -- Storage class
  storageClass: ""
  # -- Access modes
  accessModes:
    - ReadWriteOnce
  # -- Storage size
  size: 10Gi

# -- Extra environment variables
extraEnv: []

# -- Extra volumes
extraVolumes: []

# -- Extra volume mounts
extraVolumeMounts: []
