{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "livy.serviceAccountName" . }}
  labels:
    {{- include "livy.labels" . | nindent 4 }}
  {{- $annotations := deepCopy .Values.serviceAccount.annotations }}
  {{- with .Values.serviceAccount.gcpServiceAccountEmail }}
  {{- $_ := set $annotations "iam.gke.io/gcp-service-account" . }}
  {{- end }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
