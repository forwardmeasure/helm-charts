apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "livy.fullname" . }}
  labels:
    {{- include "livy.labels" . | nindent 4 }}
data:
  livy.conf: |
    # Managed by Helm.
{{- $livyConf := dict
  "livy.server.host" .Values.livy.host
  "livy.server.port" (toString .Values.livy.port)
  "livy.ui.enabled" (toString .Values.livy.uiEnabled)
  "livy.spark.master" .Values.spark.master
  "livy.spark.deploy-mode" .Values.spark.deployMode
  "livy.server.request-header.size" (toString .Values.livy.requestHeaderSize)
  "livy.server.response-header.size" (toString .Values.livy.responseHeaderSize)
  "livy.server.session.timeout" .Values.livy.sessionTimeout
  "livy.server.session.state-retain.sec" .Values.livy.sessionStateRetain
  "livy.server.access-control.enabled" (toString .Values.livy.accessControl.enabled)
  "livy.server.access-control.allowed-users" .Values.livy.accessControl.allowedUsers
  "livy.impersonation.enabled" (toString .Values.livy.impersonation.enabled)
}}
{{- $livyConf = mergeOverwrite $livyConf .Values.livy.extraConf }}
{{- range $key := keys $livyConf | sortAlpha }}
    {{ $key }} = {{ index $livyConf $key }}
{{- end }}
  spark-defaults.conf: |
    # Managed by Helm.
{{- $sparkConf := dict
  "spark.master" .Values.spark.master
  "spark.submit.deployMode" .Values.spark.deployMode
  "spark.kubernetes.namespace" (include "livy.sparkNamespace" .)
  "spark.kubernetes.authenticate.driver.serviceAccountName" (include "livy.sparkServiceAccountName" .)
  "spark.kubernetes.authenticate.executor.serviceAccountName" (include "livy.sparkServiceAccountName" .)
  "spark.kubernetes.container.image" (include "livy.sparkImage" .)
  "spark.kubernetes.container.image.pullPolicy" .Values.spark.image.pullPolicy
  "spark.kubernetes.executor.deleteOnTermination" (toString .Values.spark.kubernetes.deleteOnTermination)
  "spark.driver.cores" (toString .Values.spark.driver.cores)
  "spark.driver.memory" .Values.spark.driver.memory
  "spark.executor.instances" (toString .Values.spark.executor.instances)
  "spark.executor.cores" (toString .Values.spark.executor.cores)
  "spark.executor.memory" .Values.spark.executor.memory
  "spark.dynamicAllocation.enabled" (toString .Values.spark.dynamicAllocation.enabled)
}}
{{- if .Values.spark.dynamicAllocation.enabled }}
{{- $_ := set $sparkConf "spark.dynamicAllocation.minExecutors" (toString .Values.spark.dynamicAllocation.minExecutors) }}
{{- $_ := set $sparkConf "spark.dynamicAllocation.maxExecutors" (toString .Values.spark.dynamicAllocation.maxExecutors) }}
{{- end }}
{{- if .Values.spark.eventLog.enabled }}
{{- $_ := set $sparkConf "spark.eventLog.enabled" "true" }}
{{- $_ := set $sparkConf "spark.eventLog.dir" (required "spark.eventLog.dir is required when spark.eventLog.enabled=true" .Values.spark.eventLog.dir) }}
{{- else }}
{{- $_ := set $sparkConf "spark.eventLog.enabled" "false" }}
{{- end }}
{{- $gcsEnabled := true }}
{{- if and (hasKey .Values.spark "gcs") (hasKey .Values.spark.gcs "enabled") }}
{{- $gcsEnabled = .Values.spark.gcs.enabled }}
{{- end }}
{{- if $gcsEnabled }}
{{- $_ := set $sparkConf "spark.hadoop.fs.gs.impl" "com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem" }}
{{- $_ := set $sparkConf "spark.hadoop.fs.AbstractFileSystem.gs.impl" "com.google.cloud.hadoop.fs.gcs.GoogleHadoopFS" }}
{{- end }}
{{- $s3Enabled := true }}
{{- if and (hasKey .Values.spark "s3") (hasKey .Values.spark.s3 "enabled") }}
{{- $s3Enabled = .Values.spark.s3.enabled }}
{{- end }}
{{- if $s3Enabled }}
{{- $_ := set $sparkConf "spark.hadoop.fs.s3a.impl" "org.apache.hadoop.fs.s3a.S3AFileSystem" }}
{{- $_ := set $sparkConf "spark.hadoop.fs.AbstractFileSystem.s3a.impl" "org.apache.hadoop.fs.s3a.S3A" }}
{{- if .Values.spark.s3.endpoint }}
{{- $_ := set $sparkConf "spark.hadoop.fs.s3a.endpoint" .Values.spark.s3.endpoint }}
{{- end }}
{{- $_ := set $sparkConf "spark.hadoop.fs.s3a.path.style.access" (toString .Values.spark.s3.pathStyleAccess) }}
{{- $_ := set $sparkConf "spark.hadoop.fs.s3a.connection.ssl.enabled" (toString .Values.spark.s3.sslEnabled) }}
{{- $s3CredentialsSecretName := include "livy.s3CredentialsSecretName" . }}
{{- if .Values.spark.s3.credentialsProvider }}
{{- $_ := set $sparkConf "spark.hadoop.fs.s3a.aws.credentials.provider" .Values.spark.s3.credentialsProvider }}
{{- else if $s3CredentialsSecretName }}
{{- $_ := set $sparkConf "spark.hadoop.fs.s3a.aws.credentials.provider" "com.amazonaws.auth.EnvironmentVariableCredentialsProvider" }}
{{- end }}
{{- with $s3CredentialsSecretName }}
{{- $accessKeyIdRef := printf "%s:%s" . $.Values.spark.s3.credentials.accessKeyIdKey }}
{{- $secretAccessKeyRef := printf "%s:%s" . $.Values.spark.s3.credentials.secretAccessKeyKey }}
{{- $_ := set $sparkConf "spark.kubernetes.driver.secretKeyRef.AWS_ACCESS_KEY_ID" $accessKeyIdRef }}
{{- $_ := set $sparkConf "spark.kubernetes.executor.secretKeyRef.AWS_ACCESS_KEY_ID" $accessKeyIdRef }}
{{- $_ := set $sparkConf "spark.kubernetes.driver.secretKeyRef.AWS_SECRET_ACCESS_KEY" $secretAccessKeyRef }}
{{- $_ := set $sparkConf "spark.kubernetes.executor.secretKeyRef.AWS_SECRET_ACCESS_KEY" $secretAccessKeyRef }}
{{- if $.Values.spark.s3.credentials.sessionToken.enabled }}
{{- $sessionTokenRef := printf "%s:%s" . $.Values.spark.s3.credentials.sessionToken.key }}
{{- $_ := set $sparkConf "spark.kubernetes.driver.secretKeyRef.AWS_SESSION_TOKEN" $sessionTokenRef }}
{{- $_ := set $sparkConf "spark.kubernetes.executor.secretKeyRef.AWS_SESSION_TOKEN" $sessionTokenRef }}
{{- end }}
{{- if $.Values.spark.s3.credentials.region.enabled }}
{{- $regionRef := printf "%s:%s" . $.Values.spark.s3.credentials.region.key }}
{{- $_ := set $sparkConf "spark.kubernetes.driver.secretKeyRef.AWS_REGION" $regionRef }}
{{- $_ := set $sparkConf "spark.kubernetes.executor.secretKeyRef.AWS_REGION" $regionRef }}
{{- $_ := set $sparkConf "spark.kubernetes.driver.secretKeyRef.AWS_DEFAULT_REGION" $regionRef }}
{{- $_ := set $sparkConf "spark.kubernetes.executor.secretKeyRef.AWS_DEFAULT_REGION" $regionRef }}
{{- end }}
{{- end }}
{{- end }}
{{- $pullSecrets := include "livy.imagePullSecretsCsv" . }}
{{- if $pullSecrets }}
{{- $_ := set $sparkConf "spark.kubernetes.container.image.pullSecrets" $pullSecrets }}
{{- end }}
{{- $sparkConf = mergeOverwrite $sparkConf .Values.spark.extraConf }}
{{- range $key := keys $sparkConf | sortAlpha }}
    {{ $key }} {{ index $sparkConf $key }}
{{- end }}
