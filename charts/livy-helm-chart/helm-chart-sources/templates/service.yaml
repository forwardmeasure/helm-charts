apiVersion: v1
kind: Service
metadata:
  name: {{ include "livy.fullname" . }}
  labels:
    {{- include "livy.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.livy.rsc.enabled }}
    - port: {{ .Values.service.rscPort }}
      targetPort: rsc
      protocol: TCP
      name: rsc
    {{- end }}
  selector:
    {{- include "livy.selectorLabels" . | nindent 4 }}
