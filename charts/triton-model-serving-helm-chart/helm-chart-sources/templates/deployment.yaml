apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "triton-serving.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "triton-serving.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "triton-serving.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "triton-serving.labels" . | nindent 8 }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "triton-serving.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      # ----------------------------------------------------------------
      # Init containers — per model, in order:
      #   1. download-weights-<n> — downloads HF weights to model-cache PVC
      #                             skipped if weights already present
      #   2. git-clone-<n>        — sparse-clones model code from git
      #                             into shared model-repo emptyDir
      # ----------------------------------------------------------------
      initContainers:
        {{- range .Values.models }}
        {{- $safeName := include "triton-serving.modelSafeName" .name }}

        # ---- Step 1: Download model weights from HuggingFace ----
        - name: download-weights-{{ $safeName }}
          image: {{ include "triton-serving.modelDownloadImage" (dict "model" . "root" $) }}
          imagePullPolicy: {{ $.Values.modelDownload.image.pullPolicy }}
          securityContext:
            {{- toYaml $.Values.modelDownload.securityContext | nindent 12 }}
          resources:
            {{- include "triton-serving.modelDownloadResources" (dict "model" . "root" $) | nindent 12 }}
          env:
            {{- if $.Values.huggingFace.token.secretName }}
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.huggingFace.token.secretName }}
                  key: {{ $.Values.huggingFace.token.secretKey }}
            {{- end }}
          command:
            - /usr/local/lib/model-download-lib.sh
            - {{ .huggingFaceRepo | quote }}
            - {{ .modelWeights.mountPath | quote }}
            - {{ .name | quote }}
            - {{ ((.modelDownload).skipIfExists | default true) | quote }}
          volumeMounts:
            {{- if .modelWeights }}
            - name: model-weights-{{ $safeName }}
              mountPath: {{ .modelWeights.mountPath }}
              {{- if .modelWeights.subPath }}
              subPath: {{ .modelWeights.subPath }}
              {{- end }}
            {{- end }}

        # ---- Step 2: Sparse-clone model code from git ----
        - name: git-clone-{{ $safeName }}
          image: {{ include "triton-serving.gitInitImage" $ }}
          imagePullPolicy: {{ $.Values.gitInit.image.pullPolicy }}
          securityContext:
            {{- toYaml $.Values.gitInit.securityContext | nindent 12 }}
          resources:
            {{- toYaml $.Values.gitInit.resources | nindent 12 }}
          command:
            - sh
            - -c
            - |
              set -e

              REPO_DIR=/tmp/sparse-repo-{{ $safeName }}

              {{- if .git.credentialsSecret }}
              GIT_USER=$(cat /git-credentials-{{ $safeName }}/username)
              GIT_TOKEN=$(cat /git-credentials-{{ $safeName }}/password)
              REPO_URL=$(echo "{{ .git.url }}" | sed "s|https://|https://${GIT_USER}:${GIT_TOKEN}@|")
              {{- else }}
              REPO_URL="{{ .git.url }}"
              {{- end }}

              echo "[INFO] Sparse-cloning {{ .git.sparseCheckoutPath }} from {{ .git.url }} @ {{ .git.ref }}"

              git clone \
                --depth=1 \
                --filter=blob:none \
                --sparse \
                --branch {{ .git.ref }} \
                "${REPO_URL}" \
                "${REPO_DIR}"

              cd "${REPO_DIR}"
              git sparse-checkout set {{ .git.sparseCheckoutPath }}

              MODEL_SRC="${REPO_DIR}/{{ .git.sparseCheckoutPath }}"
              echo "[INFO] Copying ${MODEL_SRC} -> {{ $.Values.modelRepo }}/{{ .name }}"
              cp -r "${MODEL_SRC}" {{ $.Values.modelRepo }}/{{ .name }}

              echo "[INFO] Contents of {{ $.Values.modelRepo }}/{{ .name }}:"
              find {{ $.Values.modelRepo }}/{{ .name }} -type f
          volumeMounts:
            - name: model-repo
              mountPath: {{ $.Values.modelRepo }}
            {{- if .git.credentialsSecret }}
            - name: git-credentials-{{ $safeName }}
              mountPath: /git-credentials-{{ $safeName }}
              readOnly: true
            {{- end }}
        {{- end }}

      # ----------------------------------------------------------------
      # Containers — one per model.
      # Each model gets its own Triton server container allowing:
      #   - Different base images per model
      #   - Different resource profiles (CPU/GPU/memory)
      #   - Independent restarts
      # Ports offset by 10 per model index.
      # ----------------------------------------------------------------
      containers:
        {{- range $idx, $model := .Values.models }}
        {{- $safeName := include "triton-serving.modelSafeName" $model.name }}
        {{- $httpPort := add 8000 (mul $idx 10) }}
        {{- $grpcPort := add 8001 (mul $idx 10) }}
        {{- $metricsPort := add 8002 (mul $idx 10) }}
        - name: triton-{{ $safeName }}
          image: {{ include "triton-serving.modelImage" (dict "model" $model "root" $) }}
          imagePullPolicy: {{ ($model.image).pullPolicy | default $.Values.image.pullPolicy }}
          securityContext:
            {{- include "triton-serving.modelSecurityContext" (dict "model" $model "root" $) | nindent 12 }}
          command:
            - bash
            - -c
            - |
              exec tritonserver \
                --model-repository={{ $.Values.modelRepo }} \
                --model-control-mode=explicit \
                --load-model={{ $model.name }} \
                {{- range $.Values.tritonArgs }}
                {{ . }} \
                {{- end }}
                --allow-http=true \
                --allow-grpc=true \
                --allow-metrics=true \
                --http-port={{ $httpPort }} \
                --grpc-port={{ $grpcPort }} \
                --metrics-port={{ $metricsPort }}
          ports:
            - name: http-{{ $safeName }}
              containerPort: {{ $httpPort }}
              protocol: TCP
            - name: grpc-{{ $safeName }}
              containerPort: {{ $grpcPort }}
              protocol: TCP
            - name: metrics-{{ $safeName }}
              containerPort: {{ $metricsPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: {{ $httpPort }}
            initialDelaySeconds: {{ $.Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ $.Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ $.Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ $.Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: {{ $httpPort }}
            initialDelaySeconds: {{ $.Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ $.Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ $.Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ $.Values.probes.readiness.failureThreshold }}
          env:
            - name: MODEL_REPO
              value: {{ $.Values.modelRepo | quote }}
            - name: MODEL_NAME
              value: {{ $model.name | quote }}
            - name: HF_HOME
              value: /opt/hf
            - name: TRANSFORMERS_CACHE
              value: /opt/hf/cache
            - name: TORCH_CUDA_ALLOC_CONF
              value: expandable_segments:True
            {{- if $.Values.huggingFace.token.secretName }}
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.huggingFace.token.secretName }}
                  key: {{ $.Values.huggingFace.token.secretKey }}
            {{- end }}
            {{- with $.Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- include "triton-serving.modelResources" (dict "model" $model "root" $) | nindent 12 }}
          volumeMounts:
            - name: model-repo
              mountPath: {{ $.Values.modelRepo }}
              readOnly: true
            {{- if $model.modelWeights }}
            - name: model-weights-{{ $safeName }}
              mountPath: {{ $model.modelWeights.mountPath }}
              {{- if $model.modelWeights.subPath }}
              subPath: {{ $model.modelWeights.subPath }}
              {{- end }}
              readOnly: true
            {{- end }}
            {{- with $.Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- end }}

      # ----------------------------------------------------------------
      # Volumes
      # ----------------------------------------------------------------
      volumes:
        # Shared emptyDir — model code cloned by init containers
        - name: model-repo
          emptyDir: {}
        # One PVC volume per model weights entry
        {{- range .Values.models }}
        {{- $safeName := include "triton-serving.modelSafeName" .name }}
        {{- if .modelWeights }}
        - name: model-weights-{{ $safeName }}
          persistentVolumeClaim:
            claimName: {{ .modelWeights.pvcName }}
        {{- end }}
        # Git credentials secret per model (if set)
        {{- if .git.credentialsSecret }}
        - name: git-credentials-{{ $safeName }}
          secret:
            secretName: {{ .git.credentialsSecret }}
        {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}