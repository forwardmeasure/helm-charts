      name: Prashanth Nandavanam
    name: model-cache
    type: application
    urls:
    - https://forwardmeasure.github.io/helm-charts/charts/model-cache-helm-chart/model-cache-0.1.8.tgz
    version: 0.1.8
  - apiVersion: v2
    appVersion: 1.0.0
    created: "2026-04-06T18:58:02.826340719-04:00"
    description: 'Provisions the shared model cache infrastructure for model-serving
      workloads. Creates a StorageClass, PersistentVolume, PersistentVolumeClaim,
      and ServiceAccount in the release namespace. Designed to be deployed as a dependency
      before any workload that needs access to the shared model cache (docling-serve,
      Triton, etc.).  Cloud backends are configured via storageClass.provisioner and
      persistentVolume.csi — override these in your cloud-specific values file. On
      GCP this uses the GCS FUSE CSI driver. On AWS use S3 Mountpoint or EFS. On bare
      metal use NFS or local storage.  Deploy once per workload namespace that needs
      model cache access. '
