  model-cache:
  - apiVersion: v2
    appVersion: 1.0.0
    created: "2026-04-06T18:58:02.826530813-04:00"
    description: 'Provisions shared model cache infrastructure for model-serving workloads.  This
      chart supports multiple usage modes:  1. StorageClass-only mode    Creates only
      the shared cluster-scoped StorageClass.  2. Producer mode    Creates a workload-specific
      PersistentVolume and optional    PersistentVolumeClaim and ServiceAccount.  3.
      Consumer mode    Creates a namespace-scoped PersistentVolumeClaim and optional    ServiceAccount
      that bind to a pre-existing PersistentVolume.  Cloud backends are configured
      via storageClass.provisioner and persistentVolume.csi.* — override these in
      your cloud-specific values file. On GCP this can use the GCS FUSE CSI driver.
      On AWS use S3 Mountpoint or EFS. On bare metal use NFS or local storage.  This
      chart never derives PersistentVolume names from release namespace or release
      name. PersistentVolume names must always be set explicitly. '
    digest: 5cbad02d687317d13bc988b786d0bd1a82d80d9894c70d28a017c3c89dd801aa
    keywords:
    - model-cache
    - storage
    - pvc
